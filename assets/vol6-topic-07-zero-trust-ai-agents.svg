<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 07 — AI 安全性 / Anthropic 無料eBook「Zero Trust for AI Agents」</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">「エージェントは侵害される前提で設計せよ」　Anthropic が AI 導入企業向け無料ガイドを公開</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: book highlight -->
  <rect x="48" y="108" width="210" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="153" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Anthropic 公式 eBook</text>
  <line x1="68" y1="142" x2="228" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="164" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Zero Trust</text>
  <text x="153" y="184" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">for AI Agents</text>
  <line x1="68" y1="198" x2="228" y2="198" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853" text-anchor="middle">無料公開</text>
  <text x="153" y="236" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">AI 導入企業向け</text>

  <!-- Middle: core message + who should read -->
  <rect x="278" y="108" width="286" height="64" rx="8" fill="#2A1A2A"/>
  <text x="298" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">核心メッセージ</text>
  <line x1="298" y1="138" x2="544" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="298" y="157" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FF5757">「侵害される前提でエージェントを設計する」</text>
  <text x="298" y="173" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Zero Trust の考え方を AI エージェントに適用</text>

  <rect x="278" y="182" width="286" height="66" rx="8" fill="#2A1A2A"/>
  <text x="298" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">読むべき対象</text>
  <line x1="298" y1="210" x2="544" y2="210" stroke="#3A2A3A" stroke-width="1"/>
  <text x="298" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI エージェントを業務に組み込む企業</text>
  <text x="298" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757">→ 導入前に必読</text>

  <!-- Right: why it matters -->
  <rect x="584" y="108" width="248" height="140" rx="8" fill="#1E0E1E"/>
  <text x="708" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">なぜ重要か</text>
  <line x1="604" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="604" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI エージェントの権限・判断を</text>
  <text x="604" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「信頼する設計」は危険</text>
  <line x1="604" y1="194" x2="812" y2="194" stroke="#333333" stroke-width="1"/>
  <text x="604" y="214" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">開発元 Anthropic 自らが</text>
  <text x="604" y="232" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">リスク設計の指針を示す</text>
  <text x="604" y="250" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">業界標準になりうるフレームワーク</text>

  <rect x="48" y="260" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="272" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「信頼しない、検証し続ける」― AI 時代のセキュリティ設計原則を Anthropic が無料で公開</text>
</svg>
