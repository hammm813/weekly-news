<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 26 — AI × 科学 / なぜ AI はコーディングより生物学での進歩が遅いのか</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#ffffff">バイオ DB は「車が来る前に設計された都市」　エージェントが使えるインフラをどう作るか</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: the analogy -->
  <rect x="48" y="108" width="226" height="120" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="161" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">核心の比喩</text>
  <line x1="68" y1="138" x2="254" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">バイオ DB ＝</text>
  <text x="68" y="178" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">「車が来る前に作られた都市」</text>
  <text x="68" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">異なる「交通」向けに設計された</text>
  <text x="68" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">インフラにエージェントが迷い込む</text>

  <!-- Middle: coding vs bio -->
  <rect x="294" y="108" width="270" height="120" rx="8" fill="#2A1A2A"/>
  <text x="314" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">コーディング vs 生物学</text>
  <line x1="314" y1="138" x2="544" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="314" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853">コード：AI ネイティブなデータ構造</text>
  <text x="314" y="176" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">　構造化・バージョン管理・API 前提</text>
  <text x="314" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757">生物学：人間向けに設計されたデータ</text>
  <text x="314" y="216" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">　PDF・手動フォーム・分断したシロ</text>

  <!-- Right: the question + significance -->
  <rect x="584" y="108" width="248" height="120" rx="8" fill="#1E0E1E"/>
  <text x="708" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">問いと意義</text>
  <line x1="604" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="604" y="160" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">エージェントが使える</text>
  <text x="604" y="178" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">インフラをどう作るか？</text>
  <text x="604" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">AI の進化速度は</text>
  <text x="604" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">データ基盤の質に依存する</text>

  <rect x="48" y="240" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="252" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI の「次のフロンティア」は科学インフラの再設計 ― Anthropic Science Blog より</text>
</svg>
