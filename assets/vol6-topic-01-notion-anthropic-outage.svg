<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 01 — インシデント / Notion AI が Anthropic モデルを一時無効化</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">Opus 4.7・4.8 の性能低下で Notion AI が全 Anthropic モデルを無効化　代替プロバイダーに自動切替</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: affected models -->
  <rect x="48" y="108" width="200" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">影響モデル</text>
  <line x1="68" y1="140" x2="228" y2="140" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="163" font-family="'Nunito Sans',sans-serif" font-size="15" font-weight="900" fill="#FF5757" text-anchor="middle">Opus 4.7</text>
  <text x="148" y="185" font-family="'Nunito Sans',sans-serif" font-size="15" font-weight="900" fill="#FF5757" text-anchor="middle">Opus 4.8</text>
  <line x1="68" y1="198" x2="228" y2="198" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="216" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">degraded performance</text>
  <text x="148" y="234" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">高頻度エラー発生</text>

  <!-- Middle: what happened -->
  <rect x="268" y="108" width="290" height="64" rx="8" fill="#2A1A2A"/>
  <text x="288" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">対応内容</text>
  <line x1="288" y1="138" x2="538" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="157" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">モデルピッカーから全 Anthropic モデルを無効化</text>
  <text x="288" y="173" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">→ 代替プロバイダーへ自動ルーティング</text>

  <rect x="268" y="182" width="290" height="66" rx="8" fill="#2A1A2A"/>
  <text x="288" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">ユーザーへの影響</text>
  <line x1="288" y1="210" x2="538" y2="210" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">大半のユーザーは継続利用可能</text>
  <text x="288" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">Anthropic固有機能のみ利用不可</text>

  <!-- Right: insight -->
  <rect x="578" y="108" width="254" height="140" rx="8" fill="#1E0E1E"/>
  <text x="705" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">インサイト</text>
  <line x1="598" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="598" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">SaaS の AI 依存が深まるほど</text>
  <text x="598" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">モデル障害がサービス全体に</text>
  <text x="598" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">波及するリスクが顕在化</text>
  <line x1="598" y1="212" x2="812" y2="212" stroke="#333333" stroke-width="1"/>
  <text x="598" y="230" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">マルチプロバイダー設計が</text>
  <text x="598" y="246" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">障害対策の標準になる</text>

  <rect x="48" y="260" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="272" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「Anthropic が止まったら Notion も止まる」― AI 依存 SaaS の障害設計が問われる事例</text>
</svg>
