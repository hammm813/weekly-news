<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <!-- Background -->
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>

  <!-- Label -->
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 09 — 政策 / 経済産業省・NEDO 2026年5月14日発表</text>

  <!-- Title -->
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">GENIAC　製造業データのAI-Ready化・ロボット基盤モデル　計11件採択</text>

  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Stat: 11件 -->
  <text x="160" y="160" font-family="'Nunito Sans',sans-serif" font-size="72" font-weight="900" fill="#A51E6D" text-anchor="middle">11</text>
  <text x="160" y="190" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#4D4D4D" text-anchor="middle">採択テーマ数（合計）</text>

  <line x1="310" y1="110" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left detail: AI-Ready化 -->
  <rect x="330" y="110" width="240" height="118" rx="10" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <rect x="330" y="110" width="240" height="36" rx="10" fill="#A51E6D"/>
  <rect x="330" y="128" width="240" height="18" fill="#A51E6D"/>
  <text x="450" y="133" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">製造業データAI-Ready化</text>
  <text x="450" y="168" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#A51E6D" text-anchor="middle">9件</text>
  <text x="450" y="192" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">事業期間：1年間（〜2027年度）</text>
  <text x="450" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">委託事業</text>

  <!-- Right detail: Robot -->
  <rect x="590" y="110" width="240" height="118" rx="10" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <rect x="590" y="110" width="240" height="36" rx="10" fill="#8C52FF"/>
  <rect x="590" y="128" width="240" height="18" fill="#8C52FF"/>
  <text x="710" y="133" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">ロボット基盤モデル</text>
  <text x="710" y="168" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#8C52FF" text-anchor="middle">2件</text>
  <text x="710" y="192" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">事業期間：最大3年間（〜2029年度）</text>
  <text x="710" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">助成事業</text>

  <!-- Note -->
  <text x="32" y="252" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">対象：自動運転車・ドローン・無人航空機・自動運航船など自律制御ロボット　｜　主管：経済産業省・NEDO</text>
</svg>
