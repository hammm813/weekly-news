<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="100%" height="320">
  <rect width="100%" height="320" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 11 — エンジニアリング / 2026年最重要規律「Harness Engineering」完全解説</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="900" fill="#ffffff">Agent = Model + Harness　同じモデルでも Harness 次第で性能が変わる時代　3社が独立に同じ原則に到達</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: core concept -->
  <rect x="48" y="108" width="200" height="178" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">核心定義</text>
  <line x1="68" y1="138" x2="228" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Agent = Model + <tspan font-weight="700" fill="#8C52FF">Harness</tspan></text>
  <text x="68" y="178" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Model = CPU（処理能力）</text>
  <text x="68" y="196" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Harness = OS（管理・制約）</text>
  <line x1="68" y1="208" x2="228" y2="208" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="226" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">同モデル・Harness 変更だけで</text>
  <text x="68" y="244" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">52.8% → 66.5%</text>
  <text x="68" y="262" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Terminal Bench 2.0（LangChain）</text>
  <text x="68" y="280" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#FF5757">Vercel：ツール80%削除→性能向上</text>

  <!-- Middle: 5 artifacts -->
  <rect x="268" y="108" width="260" height="178" rx="8" fill="#2A1A2A"/>
  <text x="288" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">5つのHarnessアーティファクト</text>
  <line x1="288" y1="138" x2="508" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">① CLAUDE.md / AGENT.md</text>
  <text x="288" y="173" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">　エージェント向けオンボーディング文書</text>
  <text x="288" y="193" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">② JSON フィーチャーリスト</text>
  <text x="288" y="208" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">　進捗トラッカー＋テストスイート兼用</text>
  <text x="288" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">③ セッション初期化ルーティン（7ステップ）</text>
  <text x="288" y="248" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">④ スプリント契約（計画エージェントが先行）</text>
  <text x="288" y="268" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">⑤ 構造化タスクテンプレ（実ファイルパス）</text>

  <!-- Right: 3 camps + decay -->
  <rect x="548" y="108" width="284" height="110" rx="8" fill="#1E0E1E"/>
  <text x="690" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">3社が独立に到達した設計</text>
  <line x1="568" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="568" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">OpenAI：<tspan fill="#808080">環境設計を先に、実行は任せる</tspan></text>
  <text x="568" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Anthropic：<tspan fill="#808080">実行者と評価者を必ず分離</tspan></text>
  <text x="568" y="194" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ThoughtWorks：<tspan fill="#808080">事前制御×事後検証の2×2</tspan></text>
  <text x="568" y="212" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">5原則すべてで一致：コンテキスト優先・計画と実行の分離・FB必須・1つずつ・リポジトリが文書</text>

  <rect x="548" y="228" width="284" height="58" rx="8" fill="#2A1A2A"/>
  <text x="568" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">Harness Decay「削除前提で作れ」</text>
  <text x="568" y="264" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">Opus 4.5→4.6 でスプリント分解が不要に → コスト38%削減</text>
  <text x="568" y="280" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">モデル進化 = Harness 陳腐化。定期的に無効化テストして削除</text>

  <!-- Bottom bar -->
  <rect x="48" y="298" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="310" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「最高のコードより最高の制約を設計せよ」― Harness が 2026 年 AI エンジニアの中核スキルになる</text>
</svg>
