<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 08 — 企業展開 / OpenClaw × Microsoft エンタープライズ</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">OpenClaw が Microsoft と提携　社内 Windows 環境でセキュアなPC自動化が解禁</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: partnership highlight -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">提携発表</text>
  <text x="158" y="162" font-family="'Nunito Sans',sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" text-anchor="middle">OpenClaw</text>
  <text x="158" y="182" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#808080" text-anchor="middle">×</text>
  <text x="158" y="202" font-family="'Nunito Sans',sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" text-anchor="middle">Microsoft</text>
  <line x1="68" y1="214" x2="248" y2="214" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="234" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">Windows エコシステム全体へ展開</text>

  <!-- Middle: enterprise features -->
  <rect x="288" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① 社内環境でのセキュア実行</text>
  <text x="308" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">企業データを外部に出さず</text>
  <text x="308" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">オンプレミス・プライベート環境で動作</text>

  <rect x="288" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="206" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② Windows エコシステム統合</text>
  <text x="308" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Microsoft 365・Azure 環境と</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">シームレスに連携</text>

  <!-- Right: business impact -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">企業導入の意味</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">これまで：個人ツール止まり</text>
  <text x="702" y="186" font-family="'Nunito Sans',sans-serif" font-size="16" font-weight="900" fill="#FF5757" text-anchor="middle">↓</text>
  <text x="592" y="208" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">これから：全社員への展開</text>
  <text x="592" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">IT 部門承認済み・ガバナンス対応</text>
  <text x="592" y="244" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">の PC 自動化が現実に</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI 自動化が「個人の実験」から「組織の標準装備」へ ― 企業 IT の次の主戦場</text>
</svg>
