<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="260" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 18 — 国内・政策 / 日本、米 AI 事業に 800億円を拠出</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#1A1A1A">日本政府が米国 AI 事業へ 800億円を投資　日米 AI 協力が資金支援フェーズに移行</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: the number -->
  <text x="160" y="140" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">拠出規模</text>
  <text x="160" y="178" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#1A1A1A" text-anchor="middle">800億円</text>
  <text x="160" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">米 AI 事業向け</text>
  <text x="160" y="220" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">約 5.3 億ドル相当</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Middle: context -->
  <rect x="330" y="108" width="230" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">背景</text>
  <line x1="350" y1="140" x2="540" y2="140" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">日米間の AI 協力が</text>
  <text x="350" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">技術連携から資金拠出へ発展</text>
  <text x="350" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">米国 AI 産業への</text>
  <text x="350" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">政府レベルのコミットメント</text>

  <!-- Right: significance -->
  <rect x="578" y="108" width="254" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">インサイト</text>
  <line x1="598" y1="138" x2="812" y2="138" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">AI を巡る国家間の</text>
  <text x="598" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">経済・安全保障連携が加速</text>
  <text x="598" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">日本が AI 覇権競争に</text>
  <text x="598" y="214" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">資金面から参戦する姿勢を示す</text>

  <rect x="32" y="232" width="816" height="20" rx="4" fill="#F0D8E8"/>
  <text x="440" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">日本が「AI 同盟国」として資金を出す時代へ ― 国家 AI 戦略が外交の主軸に</text>
</svg>
