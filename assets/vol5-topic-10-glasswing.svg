<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 10 — 国際展開 / Anthropic Project Glasswing</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Project Glasswing 拡大　Claude Mythos Preview を15カ国以上・150組織へ提供</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: key numbers -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">アクセス拡大規模</text>
  <text x="158" y="170" font-family="'Nunito Sans',sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">150+</text>
  <text x="158" y="190" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">追加組織</text>
  <line x1="68" y1="202" x2="248" y2="202" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="224" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#8C52FF" text-anchor="middle">15+</text>
  <text x="158" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">カ国に展開</text>

  <!-- Middle: what is it -->
  <rect x="288" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">Project Glasswing とは</text>
  <text x="308" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Anthropic の国際展開プログラム</text>
  <text x="308" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">先行アクセス組織を段階的に拡大</text>

  <rect x="288" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">Claude Mythos Preview</text>
  <text x="308" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">次世代 Claude の先行プレビュー版</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">選定組織のみが先行利用可能</text>

  <!-- Right: implications -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">戦略的意味</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">グローバル市場への本格参入</text>
  <text x="592" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">先行採用企業が競争優位を獲得</text>
  <line x1="592" y1="198" x2="812" y2="198" stroke="#333333" stroke-width="1"/>
  <text x="592" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">今後：一般公開に向けた</text>
  <text x="592" y="236" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">段階的ロールアウトへ続く見込み</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">次世代 Claude への先行アクセス ― 採用タイミングが企業の AI 競争力を左右する</text>
</svg>
