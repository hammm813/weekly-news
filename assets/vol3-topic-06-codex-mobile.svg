<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 06 — Tools / OpenAI Codex × ChatGPT Mobile</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Codex、ChatGPT モバイルアプリ対応プレビュー開始　外出先から PC に指示</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Flow: Phone → Cloud → PC -->
  <rect x="48" y="116" width="180" height="120" rx="10" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
  <text x="138" y="142" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#B3B3B3" text-anchor="middle">📱 スマートフォン</text>
  <text x="138" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#999" text-anchor="middle">ChatGPT モバイルから</text>
  <text x="138" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">タスク開始・確認</text>
  <text x="138" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">実行操作・承認</text>
  <text x="138" y="226" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">外出先・移動中も OK</text>

  <text x="252" y="182" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#A51E6D" text-anchor="middle">→</text>

  <rect x="280" y="116" width="200" height="120" rx="10" fill="#350A20" stroke="#8C1050" stroke-width="1"/>
  <text x="380" y="142" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">☁️ Codex</text>
  <text x="380" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">タスクを受け取り</text>
  <text x="380" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">処理を継続実行</text>
  <text x="380" y="206" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">スマホ操作・PC処理を分離</text>
  <text x="380" y="226" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#A51E6D" text-anchor="middle">プレビュー開始</text>

  <text x="504" y="182" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#A51E6D" text-anchor="middle">→</text>

  <rect x="532" y="116" width="300" height="120" rx="10" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
  <text x="682" y="142" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#B3B3B3" text-anchor="middle">💻 PC / Mac / devbox</text>
  <text x="682" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">処理を継続して実行</text>
  <text x="682" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">リモート接続をONに設定</text>
  <text x="682" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9" text-anchor="middle">「Mac をスリープさせない」</text>
  <text x="682" y="226" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">ノートPCを閉じても作業継続</text>

  <rect x="48" y="252" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="268" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「移動中にスマホで指示 → 帰宅前に完成」という働き方が現実に　― AIエージェント活用の最も強いデモになる</text>
</svg>
