<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <!-- Background -->
  <rect width="100%" height="300" fill="#1A1A1A"/>

  <!-- Label -->
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 08 — 市場データ / 帝国データバンク 2026年3月調査</text>

  <!-- Title -->
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">生成AI活用企業　34.5%　— 65%はまだ活用できていない</text>

  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Donut chart (simplified) -->
  <circle cx="200" cy="196" r="80" fill="none" stroke="#2E2E2E" stroke-width="30"/>
  <circle cx="200" cy="196" r="80" fill="none" stroke="#A51E6D" stroke-width="30"
    stroke-dasharray="174 330" stroke-dashoffset="82" transform="rotate(-90 200 196)"/>
  <text x="200" y="188" font-family="'Nunito Sans',sans-serif" font-size="26" font-weight="900" fill="#ffffff" text-anchor="middle">34.5</text>
  <text x="200" y="210" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#B3B3B3" text-anchor="middle">%</text>

  <!-- Legend -->
  <rect x="320" y="130" width="14" height="14" rx="3" fill="#A51E6D"/>
  <text x="342" y="143" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#ffffff">活用している企業</text>
  <text x="342" y="162" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#A51E6D">34.5%</text>

  <rect x="320" y="186" width="14" height="14" rx="3" fill="#444444"/>
  <text x="342" y="199" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#B3B3B3">まだ活用できていない企業</text>
  <text x="342" y="218" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#808080">65.5%</text>

  <!-- Right: Issues -->
  <rect x="590" y="110" width="250" height="150" rx="10" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="715" y="136" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#A51E6D" text-anchor="middle">活用できない理由（課題）</text>
  <line x1="610" y1="146" x2="830" y2="146" stroke="#5A1035" stroke-width="1"/>
  <text x="610" y="168" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">① 出力の正確性への不安</text>
  <text x="610" y="190" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">② 社内運用ルールの未整備</text>
  <text x="610" y="212" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">③ 検証負担の増加</text>
  <text x="610" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">④ 活用格差の拡大</text>

  <!-- Bottom note -->
  <rect x="48" y="262" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="278" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">この65%がAIコンサルタントの最大ターゲット市場　|　主な用途：文章校正・情報収集</text>
</svg>
