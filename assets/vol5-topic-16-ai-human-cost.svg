<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 16 — 考察 / AI 多用が人間にもたらす変容</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">「AI を使うほど人間でなくなる」― ヘビーユーザーが告白する3つの変化と人的コスト</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: 3 changes -->
  <rect x="48" y="108" width="240" height="44" rx="8" fill="#2A1A2A" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="128" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#FF5757">① 感情の平坦化</text>
  <text x="68" y="144" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">AIとの対話が主体に → 人間感情への耐性が低下</text>

  <rect x="48" y="162" width="240" height="44" rx="8" fill="#2A1A2A" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="182" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#FF5757">② AI のスケジュールで生きる</text>
  <text x="68" y="198" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">睡眠・休憩が AI 効率に最適化 → 人間リズム崩壊</text>

  <rect x="48" y="216" width="240" height="44" rx="8" fill="#2A1A2A" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="236" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#FF5757">③ ADHD が加速する</text>
  <text x="68" y="252" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">並列タスク管理 → 集中持続が5h→1hに激減</text>

  <!-- Middle: key observation -->
  <rect x="308" y="108" width="264" height="152" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="440" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">ヘビーユーザーに共通するパターン</text>
  <line x1="328" y1="142" x2="552" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="328" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 労働時間が増える</text>
  <text x="328" y="186" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 集中力が低下する</text>
  <text x="328" y="208" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ より機械的になる</text>
  <line x1="328" y1="222" x2="552" y2="222" stroke="#5A1035" stroke-width="1"/>
  <text x="440" y="246" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">「生産性向上の恩恵」と</text>
  <text x="440" y="260" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">「人的コスト」は表裏一体</text>

  <!-- Right: so what -->
  <rect x="592" y="108" width="240" height="152" rx="8" fill="#1E0E1E"/>
  <text x="712" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">問われていること</text>
  <line x1="612" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="612" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI を"使う"のか</text>
  <text x="612" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI に"使われる"のか</text>
  <line x1="612" y1="200" x2="812" y2="200" stroke="#333333" stroke-width="1"/>
  <text x="612" y="222" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">AI 活用の設計に</text>
  <text x="612" y="240" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">「人間性の維持」という</text>
  <text x="612" y="258" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">視点が必要な時代へ</text>

  <rect x="48" y="272" width="784" height="22" rx="4" fill="#350A20"/>
  <text x="440" y="287" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">効率を追うほど人間性が削られる ― AI 時代の「持続可能な働き方」の設計が急務</text>
</svg>
