<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 22 — 金融 / Robinhood AI エージェントで株取引・支払いを自動化</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Robinhood が AI エージェント取引を解禁　Claude が株売買・クレカ支出を代行</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: highlight -->
  <rect x="48" y="108" width="200" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="132" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Robinhood</text>
  <text x="148" y="152" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">$HOOD</text>
  <line x1="68" y1="164" x2="228" y2="164" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">対応 AI エージェント</text>
  <text x="148" y="210" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#A51E6D" text-anchor="middle">Claude</text>
  <text x="148" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">Cursor ほか</text>

  <!-- Middle: two domains -->
  <rect x="268" y="108" width="270" height="64" rx="8" fill="#2A1A2A"/>
  <text x="288" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#34A853">① 株式投資の自動化</text>
  <text x="288" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">株の売買・ポートフォリオ管理を AI 代行</text>
  <text x="288" y="166" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">（オプション・暗号通貨は今後対応予定）</text>

  <rect x="268" y="182" width="270" height="66" rx="8" fill="#2A1A2A"/>
  <text x="288" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#FBBC04">② クレジットカード支出の代行</text>
  <text x="288" y="222" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">お得な情報検索・旅行予約・</text>
  <text x="288" y="238" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">チケット購入を仮想 Gold カードで実行</text>

  <!-- Right: user control -->
  <rect x="558" y="108" width="274" height="140" rx="8" fill="#1E0E1E"/>
  <text x="695" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">ユーザーのコントロール機能</text>
  <line x1="578" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="578" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 支出上限・取引上限の設定</text>
  <text x="578" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 実行前の承認フロー</text>
  <text x="578" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ リアルタイム通知・アラート</text>
  <line x1="578" y1="218" x2="812" y2="218" stroke="#333333" stroke-width="1"/>
  <text x="695" y="238" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">専用口座で AI の行動範囲を分離</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI がお金を動かす時代が始まった ― 「承認者としての人間」設計がここでも問われる</text>
</svg>
