<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 24 — AIモデル / Anthropic「Claude Fable 5」正式公開　Mythos クラス・史上最高性能</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#ffffff">ソフトウェア開発・科学研究・ナレッジワーク・ビジョンで業界最高水準　全有料プランと主要 API で即日利用可</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: model card -->
  <rect x="48" y="108" width="200" height="158" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">モデル概要</text>
  <line x1="68" y1="138" x2="228" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="160" font-family="'Nunito Sans',sans-serif" font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="middle">Claude Fable 5</text>
  <text x="148" y="180" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#8C52FF" text-anchor="middle">Mythos クラス</text>
  <text x="148" y="198" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">史上最高性能の公開モデル</text>
  <line x1="68" y1="210" x2="228" y2="210" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="230" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853" text-anchor="middle">2026年6月9日 正式公開</text>
  <text x="148" y="250" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">安全評価を経てリリース</text>

  <!-- Middle: strengths + availability -->
  <rect x="268" y="108" width="290" height="86" rx="8" fill="#2A1A2A"/>
  <text x="288" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">業界最高水準の4領域</text>
  <line x1="288" y1="138" x2="538" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ ソフトウェアエンジニアリング</text>
  <text x="288" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 科学研究　▸ ナレッジワーク</text>
  <text x="288" y="193" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ ビジョン（画像理解）</text>

  <rect x="268" y="204" width="290" height="62" rx="8" fill="#2A1A2A"/>
  <text x="288" y="222" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">提供先（即日）</text>
  <line x1="288" y1="232" x2="538" y2="232" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="250" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">全有料プラン・Claude Code・Claude API</text>
  <text x="288" y="266" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">主要クラウドプラットフォーム（AWS・GCP 等）</text>

  <!-- Right: significance -->
  <rect x="578" y="108" width="254" height="158" rx="8" fill="#1E0E1E"/>
  <text x="705" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">インサイト</text>
  <line x1="598" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="598" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「安全に使える最強モデル」を</text>
  <text x="598" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">全プランで即日開放</text>
  <line x1="598" y1="192" x2="812" y2="192" stroke="#333333" stroke-width="1"/>
  <text x="598" y="212" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">Notion・AWS ほか主要 SaaS が</text>
  <text x="598" y="230" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">次々と Fable 5 を統合</text>
  <text x="598" y="250" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">GPT-5 との正面対決が本格化</text>

  <rect x="48" y="278" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="290" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Mythos クラスが一般の手に渡る ― AI の「研究用最上位」と「製品」の壁が消えた瞬間</text>
</svg>
