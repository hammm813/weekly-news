<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 13 — OpenAI / IPO前に「スーパーアプリ」を投入か　ChatGPT と Codex を統合へ</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">OpenAI が ChatGPT × Codex 統合スーパーアプリを計画　IPO前の大型プロダクト再編が浮上</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: key claim -->
  <rect x="48" y="108" width="210" height="120" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="153" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">報道概要</text>
  <line x1="68" y1="140" x2="228" y2="140" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="163" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Super App</text>
  <text x="153" y="183" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">ChatGPT + Codex 統合</text>
  <text x="153" y="203" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757" text-anchor="middle">IPO 前に導入予定</text>
  <text x="153" y="222" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">（報道ベース・未公式）</text>

  <!-- Middle: what it means -->
  <rect x="278" y="108" width="280" height="120" rx="8" fill="#2A1A2A"/>
  <text x="298" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">統合の意味</text>
  <line x1="298" y1="140" x2="538" y2="140" stroke="#3A2A3A" stroke-width="1"/>
  <text x="298" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">会話 AI（ChatGPT）と</text>
  <text x="298" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">コーディングエージェント（Codex）が</text>
  <text x="298" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">1つのアプリに統合される可能性</text>
  <text x="298" y="220" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">AI オールインワン体験への集約</text>

  <!-- Right: insight -->
  <rect x="578" y="108" width="254" height="120" rx="8" fill="#1E0E1E"/>
  <text x="705" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">インサイト</text>
  <line x1="598" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="598" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">IPO前の大型リリースは</text>
  <text x="598" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">企業評価額を引き上げる戦略</text>
  <text x="598" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">Apple的「エコシステム統合」を</text>
  <text x="598" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">AI で再現する動き</text>

  <rect x="48" y="240" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="252" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">ChatGPT × Codex 統合は「AI の iPhone 化」への布石 ― OpenAI が IPO前に打つ大勝負</text>
</svg>
