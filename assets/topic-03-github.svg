<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <!-- Background -->
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>

  <!-- Label -->
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 03 — TOOLS</text>

  <!-- Title -->
  <text x="32" y="78" font-family="'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#1A1A1A">GitHub Copilot　スタンドアロンアプリ　テクニカルプレビュー開始</text>

  <!-- Divider -->
  <line x1="32" y1="94" x2="848" y2="94" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Feature boxes -->
  <rect x="32" y="112" width="380" height="80" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="222" y="145" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#A51E6D" text-anchor="middle">BEFORE</text>
  <text x="222" y="168" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D" text-anchor="middle">IDE（VS Code等）のプラグインとして提供</text>
  <text x="222" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">エンジニア専用のイメージ</text>

  <!-- Arrow -->
  <text x="430" y="158" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#A51E6D" text-anchor="middle">→</text>

  <rect x="462" y="112" width="380" height="80" rx="8" fill="#A51E6D"/>
  <text x="652" y="145" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">AFTER</text>
  <text x="652" y="168" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#E8E8E8" text-anchor="middle">IDE不要のスタンドアロンアプリ</text>
  <text x="652" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">非エンジニアでも活用できる設計へ</text>

  <!-- Note -->
  <text x="32" y="230" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D">現在：テクニカルプレビューのウェイトリスト受付中</text>
  <text x="32" y="254" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">コンサル視点：開発部門以外の社員がAI自動化を実践できる時代が本格化</text>
</svg>
