<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 13 — Tips / CLAUDE.md × Karpathy AI コーディング知見</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Karpathy「AI コーディングの失敗パターン」要約 CLAUDE.md が15万人に拡散</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: viral stat -->
  <rect x="48" y="108" width="200" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">拡散規模</text>
  <text x="148" y="178" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">15万</text>
  <text x="148" y="202" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">人以上に到達</text>
  <text x="148" y="234" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">わずか1ファイルで実現</text>

  <!-- Middle: why it works -->
  <rect x="268" y="108" width="280" height="140" rx="8" fill="#2A1A2A"/>
  <text x="288" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">なぜ支持されるのか</text>
  <line x1="288" y1="142" x2="528" y2="142" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">① CLAUDE.md 1枚で動作が改善する</text>
  <text x="288" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">② LLM の典型的失敗パターンを回避</text>
  <text x="288" y="208" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">③ 追加するだけ・設定不要</text>
  <line x1="288" y1="222" x2="528" y2="222" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="240" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">「設定を極める前に、まずこの1枚を」</text>

  <!-- Right: context -->
  <rect x="568" y="108" width="264" height="140" rx="8" fill="#1E0E1E"/>
  <text x="700" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">背景</text>
  <line x1="588" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="588" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Andrej Karpathy（元 OpenAI）</text>
  <text x="588" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">が指摘した AI コーディングの</text>
  <text x="588" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「よくある失敗」を1ページに凝縮</text>
  <line x1="588" y1="218" x2="812" y2="218" stroke="#333333" stroke-width="1"/>
  <text x="700" y="238" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">手軽さと効果のバランスが秀逸</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「CLAUDE.md を育てる」文化が広がっている ― 設定より先に"教え方"を整える時代へ</text>
</svg>
