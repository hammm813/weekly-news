<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Nunito Sans', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="880" height="300" fill="#1A1A1A"/>
  <rect x="0" y="0" width="880" height="6" fill="#A51E6D"/>

  <!-- ラベル -->
  <text x="44" y="38" font-size="11" font-weight="700" letter-spacing="2" fill="#A51E6D">TOPIC 07 — MARKET</text>

  <!-- メインタイトル -->
  <text x="440" y="80" font-size="18" font-weight="900" fill="#FFFFFF" text-anchor="middle">幹部採用にAIスキルが影響する</text>

  <!-- 大きな数字 80% -->
  <text x="280" y="185" font-size="88" font-weight="900" fill="#A51E6D" text-anchor="middle">80%</text>
  <text x="280" y="218" font-size="14" fill="#AAAAAA" text-anchor="middle">「影響する」と回答した経営層・採用担当者</text>
  <text x="280" y="240" font-size="12" fill="#888888" text-anchor="middle">出典: デロイトトーマツヒューマンリソース調査</text>

  <!-- 区切り線 -->
  <line x1="500" y1="96" x2="500" y2="260" stroke="#333333" stroke-width="1.5"/>

  <!-- 右パネル: サブ指標 -->
  <text x="700" y="115" font-size="13" font-weight="700" fill="#888888" text-anchor="middle">関連データ</text>

  <!-- 45% -->
  <rect x="540" y="126" width="320" height="56" rx="6" fill="#2A2A2A"/>
  <text x="620" y="160" font-size="36" font-weight="900" fill="#FF5757" text-anchor="middle">45%</text>
  <text x="756" y="147" font-size="13" fill="#CCCCCC" text-anchor="middle">面接で具体的な</text>
  <text x="756" y="167" font-size="13" fill="#CCCCCC" text-anchor="middle">AI実務経験を確認</text>

  <!-- 新卒採用への波及 -->
  <rect x="540" y="196" width="320" height="56" rx="6" fill="#2A2A2A"/>
  <text x="700" y="224" font-size="14" font-weight="700" fill="#A51E6D" text-anchor="middle">新卒採用にも</text>
  <text x="700" y="244" font-size="14" fill="#CCCCCC" text-anchor="middle">AI選考基準が波及拡大中</text>

  <!-- 下部メッセージ -->
  <rect x="44" y="268" width="792" height="20" rx="4" fill="#333333"/>
  <text x="440" y="282" font-size="11" fill="#AAAAAA" text-anchor="middle">「AIを使った経験」ではなく「AIで何を達成したか（数字）」が問われる時代 — 実績の可視化が不可欠</text>
</svg>
