<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 25 — Tips / Claude Code 自己検証ループの作り方</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">Claude Code に「自分の作業をチェックさせる」方法　手動確認をワークフローに組み込む</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: before/after -->
  <text x="160" y="148" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#A51E6D" text-anchor="middle">フィードバック</text>
  <text x="160" y="168" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#A51E6D" text-anchor="middle">ループ</text>
  <text x="160" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">Claude が自ら</text>
  <text x="160" y="214" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">閉じる設計</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Flow boxes -->
  <rect x="330" y="108" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="126" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">① チェック項目をワークフローに事前定義</text>
  <text x="350" y="144" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">人間が毎回行う手動確認を CLAUDE.md に書き込む</text>

  <rect x="330" y="160" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="178" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF">② 完了前に Claude 自身がチェックを実行</text>
  <text x="350" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">「渡す前に必ず確認せよ」という指示をエンコード</text>

  <rect x="330" y="212" width="490" height="28" rx="6" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="230" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#34A853">③ 問題があれば自律的に修正して再提出</text>

  <rect x="32" y="244" width="816" height="24" rx="4" fill="#F0D8E8"/>
  <text x="440" y="260" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「確認してから渡す」を Claude 自身の習慣にする ― レビュー工数がゼロに近づく</text>
</svg>
