<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 36 — 考察 / Google DeepMind CEO デミス・ハサビス スタンフォード講演</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">「AI を使う人と使わない人の差は、人類史上最大のスキル格差になる」― ハサビス</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: speaker -->
  <rect x="48" y="108" width="210" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="153" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">発言者</text>
  <line x1="68" y1="142" x2="238" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" text-anchor="middle">Demis Hassabis</text>
  <text x="153" y="184" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3" text-anchor="middle">Google DeepMind CEO</text>
  <line x1="68" y1="196" x2="238" y2="196" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">スタンフォード大学</text>
  <text x="153" y="234" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">50分の特別講演</text>

  <!-- Middle: key messages -->
  <rect x="278" y="108" width="280" height="64" rx="8" fill="#2A1A2A"/>
  <text x="298" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">核心メッセージ</text>
  <text x="298" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI を理解することは</text>
  <text x="298" y="166" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="900" fill="#FF5757">もはや選択肢ではない</text>

  <rect x="278" y="182" width="280" height="66" rx="8" fill="#2A1A2A"/>
  <text x="298" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">差が生まれる構造</text>
  <text x="298" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">使う人：生産性・機会が指数的に拡大</text>
  <text x="298" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">使わない人：相対的な競争力が急落</text>

  <!-- Right: quote highlight -->
  <rect x="578" y="108" width="254" height="140" rx="8" fill="#1E0E1E"/>
  <text x="705" y="130" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#A51E6D" text-anchor="middle">発言の重み</text>
  <line x1="598" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="598" y="162" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">一般 CEO が公言しないような</text>
  <text x="598" y="178" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">踏み込んだ内容を語った</text>
  <line x1="598" y1="192" x2="812" y2="192" stroke="#333333" stroke-width="1"/>
  <text x="705" y="214" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#8C52FF" text-anchor="middle">「人類史上最大の</text>
  <text x="705" y="234" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#8C52FF" text-anchor="middle">スキル格差」</text>
  <text x="598" y="254" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">AI 第一人者が断言した言葉</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI を学ぶ人が「勝つ」のではない。学ばない人が「脱落する」時代が来ている</text>
</svg>
