<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 10 — 国内 / 京都大学 KURA 2026年5月発表</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">京都大学、AI 英語論文支援システム「輝く」を開発・教職員 5,000 名に提供開始</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Stat -->
  <text x="160" y="168" font-family="'Nunito Sans',sans-serif" font-size="64" font-weight="900" fill="#A51E6D" text-anchor="middle">5,000</text>
  <text x="160" y="196" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#B3B3B3" text-anchor="middle">名の教職員・研究者に提供</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#333333" stroke-width="1"/>

  <!-- System features -->
  <rect x="330" y="108" width="490" height="120" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="575" y="132" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#A51E6D" text-anchor="middle">「輝く（Kagayaku）」システムの特徴</text>
  <line x1="350" y1="142" x2="800" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="350" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">開発：京都大学研究推進機構（KURA）</text>
  <text x="350" y="186" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">機能：英語論文の作成から学術誌への投稿まで一貫支援</text>
  <text x="350" y="208" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">目的：研究者の英語の壁を取り除き、国際競争力を強化</text>

  <rect x="48" y="238" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="254" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">教育・研究・行政機関への AI 活用提案　― 競合が少なく参入しやすい領域</text>
</svg>
