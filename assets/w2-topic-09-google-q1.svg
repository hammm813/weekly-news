<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="880" height="280">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Nunito Sans', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="880" height="280" fill="#F6E9F0"/>

  <!-- ラベル -->
  <text x="44" y="36" font-size="11" font-weight="700" letter-spacing="2" fill="#A51E6D">TOPIC 09 — GLOBAL</text>

  <!-- タイトル -->
  <text x="44" y="68" font-size="20" font-weight="900" fill="#1A1A1A">Google Q1 決算 — クラウド事業 AI収益化でトップ</text>

  <!-- 左: 63%大きく -->
  <rect x="44" y="84" width="220" height="160" rx="8" fill="#A51E6D"/>
  <text x="154" y="138" font-size="64" font-weight="900" fill="#FFFFFF" text-anchor="middle">63%</text>
  <text x="154" y="168" font-size="14" font-weight="700" fill="#F0C8DE" text-anchor="middle">クラウド事業</text>
  <text x="154" y="188" font-size="14" font-weight="700" fill="#F0C8DE" text-anchor="middle">前年同期比増収</text>
  <text x="154" y="212" font-size="11" fill="#E0A8C8" text-anchor="middle">Google (Alphabet) Q1 2026</text>

  <!-- 右: 四大テック比較棒グラフ -->
  <text x="330" y="104" font-size="13" font-weight="700" fill="#808080">四大テック クラウド成長率比較</text>

  <!-- Google バー -->
  <text x="330" y="134" font-size="13" font-weight="700" fill="#1A1A1A">Google</text>
  <rect x="440" y="120" width="400" height="24" rx="4" fill="#ECECEC"/>
  <rect x="440" y="120" width="400" height="24" rx="4" fill="#A51E6D"/>
  <text x="848" y="137" font-size="13" font-weight="900" fill="#A51E6D" text-anchor="start">63%</text>

  <!-- Microsoft バー -->
  <text x="330" y="174" font-size="13" font-weight="700" fill="#1A1A1A">Microsoft</text>
  <rect x="440" y="160" width="400" height="24" rx="4" fill="#ECECEC"/>
  <rect x="440" y="160" width="256" height="24" rx="4" fill="#8C52FF"/>
  <text x="704" y="177" font-size="13" font-weight="900" fill="#8C52FF" text-anchor="start">40%</text>

  <!-- Amazon バー -->
  <text x="330" y="214" font-size="13" font-weight="700" fill="#1A1A1A">Amazon</text>
  <rect x="440" y="200" width="400" height="24" rx="4" fill="#ECECEC"/>
  <rect x="440" y="200" width="224" height="24" rx="4" fill="#888888"/>
  <text x="672" y="217" font-size="13" font-weight="900" fill="#888888" text-anchor="start">35%</text>

  <!-- Meta バー -->
  <text x="330" y="254" font-size="13" font-weight="700" fill="#1A1A1A">Meta</text>
  <rect x="440" y="240" width="400" height="24" rx="4" fill="#ECECEC"/>
  <rect x="440" y="240" width="166" height="24" rx="4" fill="#AAAAAA"/>
  <text x="614" y="257" font-size="13" font-weight="900" fill="#AAAAAA" text-anchor="start">26%</text>

  <!-- 注釈 -->
  <text x="44" y="268" font-size="11" fill="#888888">純利益10兆円規模 / 検索広告16%増 / AI OverviewがGoogle広告を下支え</text>
</svg>
