<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="260" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 31 — ツール / Gemini 3.5 Live Translate 発表　70以上の言語でリアルタイム音声翻訳</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">Google が音声→音声のリアルタイム翻訳モデルを公開　20年の言語研究が Gemini と融合</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: key stat -->
  <text x="160" y="136" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">対応言語数</text>
  <text x="160" y="172" font-family="'Nunito Sans',sans-serif" font-size="40" font-weight="900" fill="#1A1A1A" text-anchor="middle">70+</text>
  <text x="160" y="194" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">言語でリアルタイム</text>
  <text x="160" y="214" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#1A73E8" text-anchor="middle">音声→音声 翻訳</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Middle: what it is -->
  <rect x="330" y="108" width="230" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="128" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">Gemini 3.5 Live Translate</text>
  <line x1="350" y1="138" x2="540" y2="138" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">▸ ライブ・スピーチ to スピーチ翻訳</text>
  <text x="350" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">▸ 遅延なし・リアルタイム処理</text>
  <text x="350" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">▸ 20年の言語バリア解消の研究を統合</text>

  <!-- Right: significance -->
  <rect x="578" y="108" width="254" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">インサイト</text>
  <line x1="598" y1="138" x2="812" y2="138" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">通訳者不要の会議・商談が</text>
  <text x="598" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">現実のものになる</text>
  <text x="598" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">言語の壁が AI でリアルタイムに消える</text>
  <text x="598" y="214" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">国際ビジネスの形が変わる転換点</text>

  <rect x="32" y="232" width="816" height="20" rx="4" fill="#F0D8E8"/>
  <text x="440" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">70言語をリアルタイム変換 ― Google が「言語の壁」を AI で完全解消する時代の幕を開ける</text>
</svg>
