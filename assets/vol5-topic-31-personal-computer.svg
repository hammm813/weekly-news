<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 31 — ツール / Claude「Personal Computer」Windows 対応</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Claude「Personal Computer」が Windows へ　ローカルで全アプリ・ファイルをオーケストレーション</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: product highlight -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">新機能</text>
  <text x="158" y="158" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">Personal</text>
  <text x="158" y="178" font-family="'Noto Sans JP',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">Computer</text>
  <text x="158" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">for Windows</text>
  <line x1="68" y1="212" x2="248" y2="212" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="230" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">ローカルマシンで動作</text>
  <text x="158" y="246" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">クラウド非依存</text>

  <!-- Middle: capabilities -->
  <rect x="288" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① アプリ横断オーケストレーション</text>
  <text x="308" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">日常使うアプリ・ファイルを</text>
  <text x="308" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Claude が横断的に制御・連携</text>

  <rect x="288" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② ローカル実行でプライバシー確保</text>
  <text x="308" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">社内データ・個人ファイルを</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">外部に出さず AI が操作</text>

  <!-- Right: rollout -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">提供スケジュール</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">先行：ウェイトリスト登録者</text>
  <text x="612" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ Max サブスクライバー</text>
  <text x="612" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ Enterprise Max サブスクライバー</text>
  <line x1="592" y1="218" x2="812" y2="218" stroke="#333333" stroke-width="1"/>
  <text x="592" y="238" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">順次一般ユーザーへの</text>
  <text x="592" y="256" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">展開が予定されている</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">PC の「使い方」が根本から変わる ― Claude がパソコン全体の司令塔になる時代が来た</text>
</svg>
