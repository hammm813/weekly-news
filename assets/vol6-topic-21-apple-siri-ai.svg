<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 21 — ツール / Apple がついに Siri を真の AI アシスタントに刷新</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">画面・写真・メッセージ・アプリ内情報・現実状況を把握して iPhone を自律操作する新 Siri</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: what Siri can now see -->
  <rect x="48" y="108" width="220" height="120" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Siri が把握できる情報</text>
  <line x1="68" y1="138" x2="228" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 今見ている画面の内容</text>
  <text x="68" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 保存した写真</text>
  <text x="68" y="194" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 着信メッセージ</text>
  <text x="68" y="212" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ アプリ内情報・現実の状況</text>

  <!-- Middle: what it can do -->
  <rect x="288" y="108" width="274" height="120" rx="8" fill="#2A1A2A"/>
  <text x="308" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">できること</text>
  <line x1="308" y1="140" x2="542" y2="140" stroke="#3A2A3A" stroke-width="1"/>
  <text x="308" y="162" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">文脈に応じて iPhone を自律操作</text>
  <text x="308" y="182" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">複数アプリをまたいで</text>
  <text x="308" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">ユーザーの状況を理解し</text>
  <text x="308" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">最適なアクションを自動実行</text>

  <!-- Right: significance -->
  <rect x="582" y="108" width="250" height="120" rx="8" fill="#1E0E1E"/>
  <text x="707" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">インサイト</text>
  <line x1="602" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="602" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">スマホの UI が変わる転換点</text>
  <text x="602" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「タップして操作」から</text>
  <text x="602" y="194" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#8C52FF">「言えばやってくれる」へ</text>
  <text x="602" y="214" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">16億台の iPhone がエージェント化</text>

  <rect x="48" y="240" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="252" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Siri が「文脈を持つ AI」になった ― 16億台のエージェント化が始まる</text>
</svg>
