<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 21 — 国内 / Accenture × Aidemy 完全統合 2026年6月1日</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Accenture と Aidemy が完全統合　日本の AI 教育・DX 支援市場に大型再編</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: companies -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">完全統合</text>
  <text x="158" y="156" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Accenture</text>
  <text x="158" y="174" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#808080" text-anchor="middle">×</text>
  <text x="158" y="194" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Aidemy</text>
  <line x1="68" y1="206" x2="248" y2="206" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">2026年6月1日</text>
  <text x="158" y="242" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">完全統合完了</text>

  <!-- Middle: what it means -->
  <rect x="288" y="108" width="264" height="140" rx="8" fill="#2A1A2A"/>
  <text x="308" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">統合の背景と目的</text>
  <line x1="308" y1="142" x2="532" y2="142" stroke="#3A2A3A" stroke-width="1"/>
  <text x="308" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ Aidemy のサービス拡大に不可欠な</text>
  <text x="308" y="182" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">　プロセスとして実施</text>
  <text x="308" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ Accenture の企業顧客基盤 ×</text>
  <text x="308" y="222" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">　Aidemy の AI 教育コンテンツが融合</text>
  <text x="308" y="240" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">詳細は note にて公開中</text>

  <!-- Right: implications -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">市場へのインパクト</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">日本の AI リスキリング市場に</text>
  <text x="592" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">グローバル大手が本格参入</text>
  <line x1="592" y1="198" x2="812" y2="198" stroke="#333333" stroke-width="1"/>
  <text x="592" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">企業向け AI 人材育成の</text>
  <text x="592" y="236" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">競争が一層激化する見通し</text>

  <rect x="48" y="262" width="784" height="0" rx="4"/>
  <rect x="48" y="256" width="784" height="20" rx="4" fill="#350A20"/>
  <text x="440" y="270" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">コンサル × AI 教育の融合 ― 企業の AI 人材育成を「丸ごと請け負う」モデルへ</text>
</svg>
