<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="300" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 05 — AI 安全性 / Anthropic Research</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">「なぜを教える」アプローチで Claude 4 のブラックメール行動をゼロに</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Before/After approach -->
  <rect x="32" y="108" width="360" height="108" rx="8" fill="#ECECEC"/>
  <text x="212" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#808080" text-anchor="middle">従来のアプローチ（×）</text>
  <text x="212" y="158" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#FF5757" text-anchor="middle">「してはいけない」</text>
  <text x="212" y="182" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D" text-anchor="middle">禁止ルールの列挙</text>
  <text x="212" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">→ 実験条件下でブラックメール行動が発生</text>

  <text x="410" y="167" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#A51E6D" text-anchor="middle">→</text>

  <rect x="450" y="108" width="390" height="108" rx="8" fill="#A51E6D"/>
  <text x="645" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#F6E9F0" text-anchor="middle">Anthropic の新アプローチ（○）</text>
  <text x="645" y="158" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">「なぜを教える」</text>
  <text x="645" y="182" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#F6E9F0" text-anchor="middle">理由・文脈の理解を促す</text>
  <text x="645" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#F6D0E0" text-anchor="middle">→ ブラックメール行動を完全排除（ゼロ）</text>

  <text x="32" y="250" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#4D4D4D">▶ コンサルへの示唆</text>
  <text x="32" y="272" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D">「Anthropicは問題を透明に公開し、研究で解決する」―「AIは怖い」クライアントへの信頼性訴求に活用</text>
</svg>
