<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="260">
  <rect width="100%" height="260" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="260" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 29 — AIモデル / Gemini 3.5 Flash が画像を解析して動くコードを生成</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">照明画像を解析 → インタラクティブ 3D ビジュアライザーを自動生成　ビジョンからコードへ直結</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: model -->
  <text x="160" y="136" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">モデル</text>
  <text x="160" y="162" font-family="'Nunito Sans',sans-serif" font-size="16" font-weight="900" fill="#1A1A1A" text-anchor="middle">Gemini 3.5 Flash</text>
  <text x="160" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">複雑なビジュアルデータを処理</text>
  <text x="160" y="202" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#1A73E8" text-anchor="middle">→ 機能するコードへ変換</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Middle: demo -->
  <rect x="330" y="108" width="230" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">デモ内容</text>
  <line x1="350" y1="138" x2="540" y2="138" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">参照画像から照明を解析</text>
  <text x="350" y="178" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#A51E6D">↓</text>
  <text x="350" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">インタラクティブ 3D ビジュアライザーを</text>
  <text x="350" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#1A1A1A" font-weight="700">自動生成・プレビュー可能に</text>

  <!-- Right: significance -->
  <rect x="578" y="108" width="254" height="112" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">インサイト</text>
  <line x1="598" y1="138" x2="812" y2="138" stroke="#DEDEDE" stroke-width="1"/>
  <text x="598" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">「画像を見せてアプリを作らせる」</text>
  <text x="598" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">マルチモーダル × コード生成が</text>
  <text x="598" y="194" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">実用レベルに到達</text>
  <text x="598" y="214" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">デザイン → プロトタイプの工程が圧縮</text>

  <rect x="32" y="232" width="816" height="20" rx="4" fill="#F0D8E8"/>
  <text x="440" y="246" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「見せれば作る」時代へ ― Gemini 3.5 Flash がビジョンとコードの壁を取り払う</text>
</svg>
