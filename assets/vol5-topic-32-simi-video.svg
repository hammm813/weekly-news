<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 32 — ツール / Simi・AI 解説動画生成</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">「解説動画版 ChatGPT」Simi が登場　1プロンプトで20秒以内にホワイトボード動画を生成</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: key stat -->
  <text x="160" y="144" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#A51E6D" text-anchor="middle">&lt;20秒</text>
  <text x="160" y="168" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#4D4D4D" text-anchor="middle">最速プランで動画完成</text>
  <text x="160" y="192" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">プロンプト 1 文から</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Features -->
  <rect x="330" y="108" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="126" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">① ホワイトボードスタイルの解説動画を自動生成</text>
  <text x="350" y="144" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">プロンプト 1 行 → 教育的な動画コンテンツが秒速で完成</text>

  <rect x="330" y="160" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="178" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF">② 「本当に教える」動画クオリティ</text>
  <text x="350" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">装飾ではなく理解を促す構成・説明に特化した設計</text>

  <rect x="330" y="212" width="490" height="28" rx="6" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="230" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#34A853">ポジショニング：解説動画版 ChatGPT</text>

  <rect x="32" y="246" width="816" height="22" rx="4" fill="#F0D8E8"/>
  <text x="440" y="261" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">研修・社内教育・コンテンツ制作のコストが激減 ― 動画制作の民主化が一気に進む</text>
