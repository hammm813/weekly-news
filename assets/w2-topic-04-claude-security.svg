<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="880" height="280">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Nunito Sans', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="880" height="280" fill="#F6E9F0"/>

  <!-- ラベル -->
  <text x="44" y="36" font-size="11" font-weight="700" letter-spacing="2" fill="#A51E6D">TOPIC 04 — CLAUDE</text>

  <!-- タイトル -->
  <text x="44" y="68" font-size="20" font-weight="900" fill="#1A1A1A">Claude Security — パブリックベータ開始（Claude Enterprise向け）</text>

  <!-- STEP 1 -->
  <rect x="44" y="88" width="240" height="148" rx="8" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1.5"/>
  <rect x="44" y="88" width="240" height="48" rx="8" fill="#A51E6D"/>
  <rect x="44" y="120" width="240" height="16" rx="0" fill="#A51E6D"/>
  <text x="68" y="108" font-size="11" font-weight="900" letter-spacing="1" fill="#F0C8DE">STEP 01</text>
  <text x="164" y="130" font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="middle">スキャン</text>
  <text x="164" y="162" font-size="13" fill="#1A1A1A" text-anchor="middle">コードベース全体を</text>
  <text x="164" y="182" font-size="13" fill="#1A1A1A" text-anchor="middle">自動スキャン</text>
  <text x="164" y="210" font-size="13" fill="#1A1A1A" text-anchor="middle">脆弱性を検出</text>

  <!-- 矢印1 -->
  <text x="316" y="170" font-size="28" fill="#A51E6D" text-anchor="middle">&#x2192;</text>

  <!-- STEP 2 -->
  <rect x="340" y="88" width="200" height="148" rx="8" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1.5"/>
  <rect x="340" y="88" width="200" height="48" rx="8" fill="#8C52FF"/>
  <rect x="340" y="120" width="200" height="16" rx="0" fill="#8C52FF"/>
  <text x="364" y="108" font-size="11" font-weight="900" letter-spacing="1" fill="#E0D0FF">STEP 02</text>
  <text x="440" y="130" font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="middle">検証</text>
  <text x="440" y="162" font-size="13" fill="#1A1A1A" text-anchor="middle">一件ずつ確認</text>
  <text x="440" y="182" font-size="13" fill="#1A1A1A" text-anchor="middle">偽陽性を大幅削減</text>
  <text x="440" y="210" font-size="13" fill="#8C52FF" font-weight="700" text-anchor="middle">精度向上</text>

  <!-- 矢印2 -->
  <text x="572" y="170" font-size="28" fill="#A51E6D" text-anchor="middle">&#x2192;</text>

  <!-- STEP 3 -->
  <rect x="596" y="88" width="240" height="148" rx="8" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1.5"/>
  <rect x="596" y="88" width="240" height="48" rx="8" fill="#FF5757"/>
  <rect x="596" y="120" width="240" height="16" rx="0" fill="#FF5757"/>
  <text x="620" y="108" font-size="11" font-weight="900" letter-spacing="1" fill="#FFD0D0">STEP 03</text>
  <text x="716" y="130" font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="middle">パッチ提案</text>
  <text x="716" y="162" font-size="13" fill="#1A1A1A" text-anchor="middle">修正案を提示</text>
  <text x="716" y="182" font-size="13" fill="#1A1A1A" text-anchor="middle">ユーザーが確認・承認</text>
  <text x="716" y="210" font-size="13" fill="#FF5757" font-weight="700" text-anchor="middle">外注不要</text>

  <!-- 下部メッセージ -->
  <rect x="44" y="250" width="792" height="20" rx="4" fill="#A51E6D"/>
  <text x="440" y="264" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">従来は専門ベンダーへ数百万〜数千万円を外注 → Claude Enterpriseでほぼ自動化。中小企業のセキュリティコストを劇的に削減。</text>
</svg>
