<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 52 — ツール / OpenAI が Ona を買収　Codex のクラウド実行基盤を強化</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#ffffff">セキュアなクラウド実行技術を取得　PCを閉じても動く長時間タスクと本番エージェント展開が可能に</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: acquisition info -->
  <rect x="48" y="108" width="200" height="158" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">買収概要</text>
  <line x1="68" y1="138" x2="228" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="162" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle">Ona</text>
  <text x="148" y="182" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">@ona_hq</text>
  <line x1="68" y1="196" x2="228" y2="196" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853" text-anchor="middle">OpenAI が買収合意</text>
  <text x="148" y="236" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">Codex チームに合流予定</text>
  <text x="148" y="256" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#8C52FF" text-anchor="middle">セキュア・クラウド実行技術</text>

  <!-- Middle: capabilities -->
  <rect x="268" y="108" width="290" height="158" rx="8" fill="#2A1A2A"/>
  <text x="288" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">Codex が得る能力</text>
  <line x1="288" y1="138" x2="538" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ PC を閉じても継続する長時間タスク</text>
  <text x="288" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 組織が本番環境でエージェントを</text>
  <text x="288" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">　 安全にデプロイできるインフラ</text>
  <line x1="288" y1="210" x2="538" y2="210" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="230" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">背景</text>
  <text x="288" y="248" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Codex のクラウド化・エージェント量産の</text>
  <text x="288" y="264" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">インフラ強化が狙い</text>

  <!-- Right: insight -->
  <rect x="578" y="108" width="254" height="158" rx="8" fill="#1E0E1E"/>
  <text x="705" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">インサイト</text>
  <line x1="598" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="598" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「PCを閉じても動く」は</text>
  <text x="598" y="176" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757">Loop Engineering の核心課題</text>
  <line x1="598" y1="192" x2="812" y2="192" stroke="#333333" stroke-width="1"/>
  <text x="598" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">Topic 36/38 Loop → ローカル依存を脱し</text>
  <text x="598" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">クラウドで自律実行する未来へ</text>
  <text x="598" y="248" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">OpenAI が Codex を「常時稼働」へ進化させる</text>
  <text x="598" y="264" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">インフラ戦略の一手</text>

  <rect x="48" y="278" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="290" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Ona 買収で Codex が「眠らないエージェント」へ ― OpenAI のクラウド実行戦略が加速</text>
</svg>