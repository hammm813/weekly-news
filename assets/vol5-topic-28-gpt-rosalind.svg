<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 28 — AI モデル / OpenAI GPT-Rosalind ライフサイエンス特化</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">GPT-Rosalind 発表　創薬・実験ワークフローを GPT-5.5 エージェント機能で加速</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: model highlight -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="132" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">GPT-Rosalind</text>
  <text x="158" y="152" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">by OpenAI</text>
  <line x1="68" y1="164" x2="248" y2="164" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="186" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">ライフサイエンス</text>
  <text x="158" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">研究特化モデル</text>
  <text x="158" y="228" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">エンタープライズスケール</text>
  <text x="158" y="244" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">GPT-5.5 エージェント機能搭載</text>

  <!-- Middle: use cases -->
  <rect x="288" y="108" width="264" height="140" rx="8" fill="#2A1A2A"/>
  <text x="308" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">対応する研究領域</text>
  <line x1="308" y1="142" x2="532" y2="142" stroke="#3A2A3A" stroke-width="1"/>
  <text x="308" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 創薬（Drug Discovery）</text>
  <text x="308" y="184" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ データ分析・解析</text>
  <text x="308" y="204" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 分子・化合物設計</text>
  <text x="308" y="224" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 実験ワークフロー自動化</text>
  <text x="308" y="244" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">コーディング × ツール使用 × 専門知識を統合</text>

  <!-- Right: what's new -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">なぜ重要か</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">AI × 製薬の融合が</text>
  <text x="592" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">エンタープライズレベルへ</text>
  <line x1="592" y1="198" x2="812" y2="198" stroke="#333333" stroke-width="1"/>
  <text x="592" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">新薬開発サイクルの</text>
  <text x="592" y="236" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">大幅短縮が現実に</text>
  <text x="592" y="254" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Mayo Clinic 連携とも連動する流れ</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI が科学者のパートナーになる ― 創薬・医療分野が AI 特化モデルの主戦場になりつつある</text>
</svg>
