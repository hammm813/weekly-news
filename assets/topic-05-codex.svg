<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <!-- Background -->
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>

  <!-- Label -->
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 05 — TOOLS / OPENAI</text>

  <!-- Title -->
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#1A1A1A">OpenAI Codex　Hooks機能追加 ＆ モバイルアプリから操作可能に</text>

  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: Hooks -->
  <rect x="32" y="110" width="390" height="130" rx="10" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <rect x="32" y="110" width="390" height="36" rx="10" fill="#A51E6D"/>
  <rect x="32" y="128" width="390" height="18" fill="#A51E6D"/>
  <text x="227" y="133" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">HOOKS 機能</text>
  <text x="52" y="168" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・作業前後にバリデーターを自動実行</text>
  <text x="52" y="190" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・プロンプト内のシークレットをスキャン</text>
  <text x="52" y="212" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・会話ログを社内システムへ記録</text>
  <text x="52" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・メモリの自動生成・管理</text>

  <!-- Right: Mobile -->
  <rect x="442" y="110" width="406" height="130" rx="10" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <rect x="442" y="110" width="406" height="36" rx="10" fill="#8C52FF"/>
  <rect x="442" y="128" width="406" height="18" fill="#8C52FF"/>
  <text x="645" y="133" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">モバイル操作（プレビュー）</text>
  <text x="462" y="168" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・スマートフォンから新タスクを開始</text>
  <text x="462" y="190" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・出力結果をモバイルで確認</text>
  <text x="462" y="212" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・実行のコントロール・承認</text>
  <text x="462" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#333333">・PCはバックグラウンドで継続稼働</text>

  <!-- Note -->
  <text x="32" y="262" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">外出先からAIに作業を依頼し、帰社時に確認する働き方が現実に</text>
</svg>
