<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <!-- Background -->
  <rect width="100%" height="300" fill="#1A1A1A"/>

  <!-- Label -->
  <text x="48" y="48" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 04 — TOOLS</text>

  <!-- Title -->
  <text x="48" y="82" font-family="'Noto Sans JP',sans-serif" font-size="20" font-weight="900" fill="#ffffff">Notion　デベロッパープラットフォーム　7つの新機能</text>

  <!-- Divider -->
  <line x1="48" y1="98" x2="832" y2="98" stroke="#333333" stroke-width="1"/>

  <!-- Feature pills - Row 1 -->
  <rect x="48" y="116" width="180" height="40" rx="20" fill="#6B1040" stroke="#A51E6D" stroke-width="1"/>
  <text x="138" y="141" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">① Notion CLI (ntn)</text>

  <rect x="242" y="116" width="180" height="40" rx="20" fill="#6B1040" stroke="#A51E6D" stroke-width="1"/>
  <text x="332" y="141" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">② Workers</text>

  <rect x="436" y="116" width="180" height="40" rx="20" fill="#6B1040" stroke="#A51E6D" stroke-width="1"/>
  <text x="526" y="141" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">③ Database Sync</text>

  <rect x="630" y="116" width="200" height="40" rx="20" fill="#6B1040" stroke="#A51E6D" stroke-width="1"/>
  <text x="730" y="141" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">④ Agent Tools</text>

  <!-- Feature pills - Row 2 -->
  <rect x="48" y="168" width="200" height="40" rx="20" fill="#3A2070" stroke="#6641CC" stroke-width="1"/>
  <text x="148" y="193" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">⑤ Webhook Triggers</text>

  <rect x="262" y="168" width="220" height="40" rx="20" fill="#3A2070" stroke="#6641CC" stroke-width="1"/>
  <text x="372" y="193" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">⑥ External Agents API</text>

  <rect x="496" y="168" width="220" height="40" rx="20" fill="#3A2070" stroke="#6641CC" stroke-width="1"/>
  <text x="606" y="193" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">⑦ Notion Agents SDK</text>

  <!-- Divider -->
  <line x1="48" y1="224" x2="832" y2="224" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Quote -->
  <text x="48" y="250" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#A51E6D">" 近い将来、開発者でなくても</text>
  <text x="48" y="270" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#A51E6D">　エージェントが代わりにビルドしてくれる "</text>
  <text x="680" y="270" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">— Notion 公式発表</text>
</svg>
