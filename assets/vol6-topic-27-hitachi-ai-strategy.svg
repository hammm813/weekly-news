<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 27 — 国内・企業戦略 / 日立「Investor Briefing 2026」　21兆円受注残を武器に社会インフラを AI 化</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="900" fill="#ffffff">110年のインフラ知見 × 80年の IT 事業　「フィジカル AI」で世界の社会インフラの OS になる戦略</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: FY2025 results -->
  <rect x="48" y="108" width="196" height="158" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="146" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">FY2025 実績</text>
  <line x1="68" y1="138" x2="224" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="146" y="162" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle">21兆円</text>
  <text x="146" y="180" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3" text-anchor="middle">受注残高（過去最高）</text>
  <line x1="68" y1="192" x2="224" y2="192" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="212" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">利益・CF・ROIC 過去最高</text>
  <text x="68" y="230" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">株主還元 5,572億円（前年比+1,678億）</text>
  <text x="68" y="250" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">北米エネルギー・AI 開発に</text>
  <text x="68" y="266" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">大規模成長投資を継続</text>

  <!-- Middle: AI strategy -->
  <rect x="264" y="108" width="290" height="158" rx="8" fill="#2A1A2A"/>
  <text x="284" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">次の成長エンジン：フィジカル AI</text>
  <line x1="284" y1="138" x2="534" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="284" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">電力グリッド保守：<tspan font-weight="700" fill="#8C52FF">2035年までに15兆円</tspan>市場</text>
  <text x="284" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">鉄道 AI 応用：<tspan font-weight="700" fill="#8C52FF">2030年までに13兆円</tspan>市場</text>
  <line x1="284" y1="192" x2="534" y2="192" stroke="#3A2A3A" stroke-width="1"/>
  <text x="284" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">SE 3.5万名に AI を組み合わせて展開</text>
  <text x="284" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">既存1.5万システムを「AI-Ready」化</text>
  <text x="284" y="248" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">FDE（現場常駐エンジニア）を派遣し</text>
  <text x="284" y="266" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">問題定義から運用まで端から端を担う</text>

  <!-- Right: vision + insight -->
  <rect x="574" y="108" width="258" height="158" rx="8" fill="#1E0E1E"/>
  <text x="703" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">ビジョンとインサイト</text>
  <line x1="594" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="594" y="160" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">「社会インフラの OS」</text>
  <text x="594" y="178" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">ソフトウェア AI ではなく</text>
  <text x="594" y="196" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">現場を動かすフィジカル AI</text>
  <line x1="594" y1="210" x2="812" y2="210" stroke="#333333" stroke-width="1"/>
  <text x="594" y="230" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">インフラ × IT の複合知見が</text>
  <text x="594" y="248" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">参入障壁となり競合を阻む</text>
  <text x="594" y="266" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Lumada 80-20 戦略を FY2026 から加速</text>

  <!-- Bottom bar -->
  <rect x="48" y="278" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="290" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">21兆円の受注残×フィジカル AI ― 日立が「製造業」から「世界インフラ AI 企業」に脱皮する瞬間</text>
</svg>
