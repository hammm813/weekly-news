<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="100%" height="320">
  <rect width="100%" height="320" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 32 — Tips / Claude Fable 5 時代に変えるべきは「プロンプトの語尾」ではなく「作業契約」</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="900" fill="#ffffff">Anthropic 公式ベストプラクティスをもとに実務向けに整理　長く任せる前提で7項目の骨格を渡せ</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: core insight -->
  <rect x="48" y="108" width="200" height="178" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Fable 5 時代の発想転換</text>
  <line x1="68" y1="138" x2="228" y2="138" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">従来：きれいな命令文を書く</text>
  <line x1="68" y1="172" x2="228" y2="172" stroke="#5A1035" stroke-width="1"/>
  <text x="148" y="192" font-family="'Nunito Sans',sans-serif" font-size="18" font-weight="900" fill="#FF5757" text-anchor="middle">↓</text>
  <text x="68" y="212" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">「作業契約」を渡す</text>
  <text x="68" y="230" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">作業範囲と判断基準を定義</text>
  <line x1="68" y1="244" x2="228" y2="244" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="264" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">AIが賢くなるほど</text>
  <text x="68" y="280" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#8C52FF">人間の仕事は「境界線を引くこと」</text>

  <!-- Middle: 7 items -->
  <rect x="268" y="108" width="276" height="178" rx="8" fill="#2A1A2A"/>
  <text x="288" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">長時間タスクの7項目（公式準拠）</text>
  <line x1="288" y1="138" x2="524" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="157" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">① 目的　② 成果物　③ 制約</text>
  <text x="288" y="175" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">④ 良い例 / 悪い例　⑤ 構造（XML）</text>
  <text x="288" y="193" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757">⑥ 検証方法　⑦ 進捗報告</text>
  <line x1="288" y1="207" x2="524" y2="207" stroke="#3A2A3A" stroke-width="1"/>
  <text x="288" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">最重要：停止条件</text>
  <text x="288" y="244" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#D9D9D9">「前提不足なら推測で進めず質問する」</text>
  <text x="288" y="262" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">長時間タスクほど停止条件が命綱</text>
  <text x="288" y="280" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">「最後まで正しく間違えた成果物」を防ぐ</text>

  <!-- Right: before/after + checklist -->
  <rect x="564" y="108" width="268" height="178" rx="8" fill="#1E0E1E"/>
  <text x="698" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Before → After</text>
  <line x1="584" y1="138" x2="812" y2="138" stroke="#333333" stroke-width="1"/>
  <text x="584" y="158" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">✗「この仕様書をレビューして。」</text>
  <text x="584" y="178" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">情報不足 → AI が迷う・方向が散る</text>
  <line x1="584" y1="192" x2="812" y2="192" stroke="#333333" stroke-width="1"/>
  <text x="584" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853">✓ 目的 / 成果物 / 制約 / 例 /</text>
  <text x="584" y="228" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#34A853">　 XML構造 / 停止条件 を明記</text>
  <line x1="584" y1="242" x2="812" y2="242" stroke="#333333" stroke-width="1"/>
  <text x="584" y="260" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">公式：明確な指示・例の提示・</text>
  <text x="584" y="276" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">XML構造化・検証手段を渡すことを推奨</text>

  <rect x="48" y="298" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="310" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「言い回し」より「骨格」　7項目の作業契約が Fable 5 を最大限に引き出す鍵</text>
</svg>
