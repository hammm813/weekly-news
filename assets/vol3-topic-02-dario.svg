<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 02 — 重要 / Anthropic CEO 発言 · WSJ インタビュー</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Dario Amodei「ソフトウェアはほぼ無料に　キャリアが消える可能性」</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Quote block -->
  <rect x="48" y="108" width="500" height="140" rx="8" fill="#2A1A2A"/>
  <text x="70" y="136" font-family="'Nunito Sans',sans-serif" font-size="32" fill="#A51E6D">"</text>
  <text x="100" y="140" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">ソフトウェアの価格は劇的に下がり、</text>
  <text x="100" y="162" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">ほぼ無料になる可能性がある。</text>
  <text x="100" y="186" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">同時に、数十年かけて築いてきた</text>
  <text x="100" y="208" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">職業・キャリアが消える可能性がある。</text>
  <text x="100" y="232" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">— Dario Amodei（Anthropic CEO）　WSJ インタビューより</text>

  <!-- Right stat -->
  <rect x="572" y="108" width="260" height="66" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="702" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">変化の規模への認識</text>
  <text x="702" y="160" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9" text-anchor="middle">社会の準備は　まだ不十分</text>

  <rect x="572" y="184" width="260" height="64" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="702" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AIコンサルタントへの示唆</text>
  <text x="702" y="232" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9" text-anchor="middle">「今動く」が最大の差別化</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AIを開発する当事者が「ほぼ無料」と言う時代　― 変化の速度を正確に伝えるコンサルの価値が急上昇</text>
</svg>
