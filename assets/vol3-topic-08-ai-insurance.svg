<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 08 — 市場 / 新カテゴリ保険 · 米 Corgi</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">「AI が暴走したときの保険」登場　Corgi が $108M 調達</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Coverage items -->
  <rect x="48" y="110" width="370" height="120" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="233" y="134" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#A51E6D" text-anchor="middle">AI カバレッジの補償範囲</text>
  <line x1="68" y1="144" x2="400" y2="144" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">① ハルシネーション（AI 誤情報）による損害</text>
  <text x="68" y="184" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">② バイアスによる差別・不公平な判断</text>
  <text x="68" y="204" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">③ 著作権侵害</text>
  <text x="68" y="224" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">④ 自律エージェントの誤作動・予期せぬ行動</text>

  <!-- Right: market strategy -->
  <rect x="444" y="110" width="388" height="54" rx="8" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
  <text x="638" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#B3B3B3" text-anchor="middle">大手保険（Berkshire・Chubb）の動き</text>
  <text x="638" y="154" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#FF5757" text-anchor="middle">「AI リスクを保険対象から除外」申請中</text>

  <rect x="444" y="174" width="388" height="56" rx="8" fill="#3A1A60" stroke="#6641CC" stroke-width="1"/>
  <text x="638" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#B3B3B3" text-anchor="middle">Corgi の逆張り戦略</text>
  <text x="638" y="218" font-family="'Nunito Sans',sans-serif" font-size="20" font-weight="900" fill="#8C52FF" text-anchor="middle">$108M 調達</text>

  <rect x="48" y="248" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="264" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI 導入提案に「リスク管理プラン」を加えるだけで　競合との差別化が生まれる</text>
</svg>
