<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 01 — Global / Claude Opus 4.8 リリース &amp; Dynamic Workflows</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Opus 4.8：Dynamic Workflows で最大1,000エージェントが自律並列実行</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Key stat -->
  <rect x="48" y="108" width="180" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="138" y="138" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">SWE-Bench Pro</text>
  <text x="138" y="172" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">69.2%</text>
  <text x="138" y="196" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="700" fill="#FF5757" text-anchor="middle">← 64.3%</text>
  <text x="138" y="220" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">前バージョン比 +4.9pt</text>

  <!-- Feature boxes -->
  <rect x="248" y="108" width="190" height="64" rx="8" fill="#2A1A2A"/>
  <text x="268" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① Effort Control</text>
  <text x="268" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">low / medium / high /</text>
  <text x="268" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">xhigh / max の5段階調整</text>

  <rect x="248" y="182" width="190" height="66" rx="8" fill="#2A1A2A"/>
  <text x="268" y="206" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② Dynamic Workflows</text>
  <text x="268" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">最大1,000エージェント</text>
  <text x="268" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">が段取り書（コード）で自律実行</text>

  <rect x="458" y="108" width="374" height="140" rx="8" fill="#2A1A2A"/>
  <text x="478" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">③ Fast Mode — スピードと価格の革命</text>
  <text x="478" y="158" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">処理速度：従来比</text>
  <text x="628" y="158" font-family="'Nunito Sans',sans-serif" font-size="20" font-weight="900" fill="#FF5757">2.5倍</text>
  <text x="478" y="184" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">利用価格：従来比</text>
  <text x="628" y="184" font-family="'Nunito Sans',sans-serif" font-size="20" font-weight="900" fill="#8C52FF">1/3</text>
  <text x="478" y="210" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">高速・低コストで大量タスクの並列処理が現実に</text>
  <text x="478" y="232" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">エージェントオーケストレーションのコスト障壁が大幅低下</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">最大1,000並列エージェントが"段取り書（コード）"で自律実行する時代へ</text>
</svg>
