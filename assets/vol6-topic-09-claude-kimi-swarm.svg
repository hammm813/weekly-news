<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="100%" height="320">
  <rect width="100%" height="320" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 09 — ビジネス活用 / Claude + Kimi Agent Swarm でソロ月収 $10K を作る構成</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="17" font-weight="900" fill="#ffffff">Claude が考えて Swarm（300並列）が実行する　3日かかった競合調査が2時間に、月15本レポートを1人で捌く</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: role split -->
  <rect x="48" y="108" width="210" height="178" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="153" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">役割分担</text>
  <line x1="68" y1="140" x2="228" y2="140" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="162" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">Claude</text>
  <text x="153" y="180" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3" text-anchor="middle">思考・計画・統合・最終判断</text>
  <line x1="68" y1="192" x2="228" y2="192" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="212" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#8C52FF" text-anchor="middle">Kimi Swarm</text>
  <text x="153" y="230" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3" text-anchor="middle">最大300並列・4,000ステップ実行</text>
  <line x1="68" y1="242" x2="228" y2="242" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="260" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">脳は実行しない</text>
  <text x="153" y="278" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">手は考えない</text>

  <!-- Middle: 5 business models (compact) -->
  <rect x="278" y="108" width="288" height="178" rx="8" fill="#2A1A2A"/>
  <text x="298" y="128" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">5つのマネタイズモデル</text>
  <line x1="298" y1="138" x2="546" y2="138" stroke="#3A2A3A" stroke-width="1"/>
  <text x="298" y="157" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">① 競合インテリジェンス</text>
  <text x="440" y="157" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF" text-anchor="end">$500〜1,500/月/社</text>
  <text x="298" y="175" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">② LinkedIn ゴーストライター</text>
  <text x="440" y="175" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF" text-anchor="end">$1,500〜3,000/月</text>
  <text x="298" y="193" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">③ ニッチ調査レポート（30p PDF）</text>
  <text x="440" y="193" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF" text-anchor="end">$500〜2,000/本</text>
  <text x="298" y="211" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">④ リードエンリッチメント</text>
  <text x="440" y="211" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF" text-anchor="end">$1〜3/件</text>
  <text x="298" y="229" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">⑤ M&amp;A デューデリジェンス</text>
  <text x="440" y="229" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF" text-anchor="end">$500〜1,500/件</text>
  <line x1="298" y1="242" x2="546" y2="242" stroke="#3A2A3A" stroke-width="1"/>
  <text x="298" y="260" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">実績：月3本→15本（同じ時間で）</text>
  <text x="298" y="278" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">$1,200×15本 = $18,000/月（ソロ1名）</text>

  <!-- Right: brief structure -->
  <rect x="586" y="108" width="246" height="178" rx="8" fill="#1E0E1E"/>
  <text x="709" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">唯一のスキル：ブリーフの書き方</text>
  <line x1="606" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="606" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">① ゴール（何を達成するか）</text>
  <text x="606" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">② 成果物（PDF/CSV/HTML）</text>
  <text x="606" y="198" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">③ エージェントの役割設定</text>
  <text x="606" y="216" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">④ 検証基準（良い出力の定義）</text>
  <line x1="606" y1="230" x2="812" y2="230" stroke="#333333" stroke-width="1"/>
  <text x="606" y="250" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#FF5757">Swarm は解釈しない。実行するだけ</text>
  <text x="606" y="268" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">曖昧なブリーフ → 曖昧な成果物</text>
  <text x="606" y="286" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">これがこの仕事の本質的スキル</text>

  <!-- Bottom bar -->
  <rect x="48" y="298" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="310" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「300の手を持つ脳」が1人事業の天井を壊す ― Claude × Swarm アーキテクチャの実装</text>
</svg>
