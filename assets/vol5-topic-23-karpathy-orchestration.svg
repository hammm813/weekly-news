<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 23 — 考察 / Karpathy が示すエンジニアリングの相転移</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#ffffff">「モデルに指示するな、成功基準を与えてループさせろ」― AI 時代の最高レバレッジ人材像</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: the key shift -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">エンジニアリングの変化</text>
  <line x1="68" y1="142" x2="248" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">手動コーディング 80%</text>
  <text x="158" y="182" font-family="'Nunito Sans',sans-serif" font-size="18" font-weight="900" fill="#FF5757" text-anchor="middle">↓ 数ヶ月</text>
  <text x="158" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">エージェント駆動 80%</text>
  <line x1="68" y1="218" x2="248" y2="218" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="236" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">AI が完璧でなくても</text>
  <text x="158" y="250" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">レバレッジが圧倒的すぎる</text>

  <!-- Middle: Karpathy's insight -->
  <rect x="288" y="108" width="264" height="140" rx="8" fill="#2A1A2A"/>
  <text x="308" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">Karpathy の核心</text>
  <line x1="308" y1="140" x2="532" y2="140" stroke="#3A2A3A" stroke-width="1"/>
  <text x="308" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">旧：「この関数を書け」</text>
  <text x="420" y="184" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#FF5757" text-anchor="middle">↓</text>
  <text x="308" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">新：「ゴール・制約・テスト・</text>
  <text x="308" y="222" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">　　検証系を渡して反復させる」</text>
  <line x1="308" y1="234" x2="532" y2="234" stroke="#3A2A3A" stroke-width="1"/>
  <text x="308" y="248" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">CLAUDE.md = エージェントの OS として機能</text>

  <!-- Right: multi-agent team -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="130" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">並列エージェントチーム編成</text>
  <line x1="592" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="592" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ リサーチ担当エージェント</text>
  <text x="592" y="178" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ デバッグ担当エージェント</text>
  <text x="592" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ テスト作成エージェント</text>
  <text x="592" y="214" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">▸ 最適化・検証エージェント</text>
  <line x1="592" y1="228" x2="812" y2="228" stroke="#333333" stroke-width="1"/>
  <text x="702" y="246" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">「AI 支援」ではなく「本物の指揮」</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">最高レバレッジの人材 = 最高のコーダーではなく「AI システムの最高の設計者」</text>
</svg>
