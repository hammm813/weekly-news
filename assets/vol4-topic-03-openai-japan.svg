  <text x="695" y="178" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9" text-anchor="middle">競合プレーヤーが少ない</text>
  <text x="695" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#FF5757" text-anchor="middle">参入チャンス</text>
  <text x="695" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">セキュリティリスク管理の</text>
  <text x="695" y="244" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">提案価値が急上昇中</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">金融×AIは競合が少なく参入しやすい ― セキュリティリスク管理の提案価値が急上昇</text>
