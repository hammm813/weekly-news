<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 03 — 国内 / OpenAI × 日本政府サイバーセキュリティ / 3メガバンク採用</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">OpenAI、サイバーセキュリティ専用モデルを日本政府・3メガバンクへ提供</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Key stat -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">専用モデル名</text>
  <text x="158" y="168" font-family="'Nunito Sans',sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" text-anchor="middle">GPT-5.5</text>
  <text x="158" y="192" font-family="'Nunito Sans',sans-serif" font-size="16" font-weight="900" fill="#FF5757" text-anchor="middle">-Cyber</text>
  <text x="158" y="220" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">サイバーセキュリティ特化型</text>
  <text x="158" y="238" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">AIモデル（日本向け優先提供）</text>

  <!-- Feature boxes -->
  <rect x="288" y="108" width="250" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">提供先 ① 日本政府機関</text>
  <text x="308" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">サイバー攻撃検知・対策支援</text>
  <text x="308" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">国家レベルのセキュリティ強化</text>

  <rect x="288" y="182" width="250" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="206" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">提供先 ② 3メガバンク</text>
  <text x="308" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">金融機関向けセキュリティAI</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">不正検知・リスク管理に特化</text>

  <!-- Right box -->
  <rect x="558" y="108" width="274" height="140" rx="8" fill="#1E0E1E"/>
  <text x="695" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">市場の空白地帯</text>
