<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 09 — ツール / Claude Code /fork コマンド刷新</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Claude Code「/fork」刷新　バックグラウンドエージェントが同一コンテキストで並列実行</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: what changed -->
  <rect x="48" y="108" width="196" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="146" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">コマンド体系の変化</text>
  <line x1="68" y1="144" x2="224" y2="144" stroke="#5A1035" stroke-width="1"/>
  <text x="68" y="166" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="900" fill="#FF5757">/fork</text>
  <text x="68" y="184" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3">→ 刷新（自律実行）</text>
  <line x1="68" y1="196" x2="224" y2="196" stroke="#3A1020" stroke-width="1"/>
  <text x="68" y="216" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="900" fill="#8C52FF">/branch</text>
  <text x="68" y="234" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#B3B3B3">← 旧 /fork を継承</text>

  <!-- Middle: new /fork -->
  <rect x="264" y="108" width="274" height="140" rx="8" fill="#2A1A2A"/>
  <text x="401" y="130" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#FF5757" text-anchor="middle">/fork（新）</text>
  <line x1="284" y1="140" x2="518" y2="140" stroke="#3A2A3A" stroke-width="1"/>
  <text x="284" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">バックグラウンドで自律エージェント起動</text>
  <text x="284" y="180" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">■ 同一コンテキストを完全継承</text>
  <text x="296" y="198" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">（システムプロンプト・ツール・履歴・モデル）</text>
  <text x="284" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">■ プロンプトキャッシュも共有</text>
  <text x="284" y="238" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">■ 結果は元セッションに返却</text>

  <!-- Right: /branch -->
  <rect x="558" y="108" width="274" height="140" rx="8" fill="#1E0E1E"/>
  <text x="695" y="130" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#8C52FF" text-anchor="middle">/branch（旧 /fork）</text>
  <line x1="578" y1="140" x2="812" y2="140" stroke="#333333" stroke-width="1"/>
  <text x="578" y="162" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">トランスクリプトを新セッションにコピー</text>
  <text x="578" y="182" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ユーザーが手動で操作を続ける</text>
  <line x1="578" y1="198" x2="812" y2="198" stroke="#333333" stroke-width="1"/>
  <text x="695" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">探索・実験用途に最適</text>
  <text x="695" y="238" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080" text-anchor="middle">人間が主導するブランチ作業</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">/fork で AI が並列思考、/branch で人間が並列思考 ― 用途に応じた分岐が可能に</text>
</svg>
