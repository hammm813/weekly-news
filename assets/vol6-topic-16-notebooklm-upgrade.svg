<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="300" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 16 — ツール / NotebookLM がエージェント化　Gemini 3.5 × クラウド PC で研究から資料作成まで一気通貫</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="900" fill="#1A1A1A">「資料を渡して質問するツール」から「一緒に調べて成果物を作るパートナー」へ　100以上のスキルで全工程を自律実行</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: engine -->
  <text x="160" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">基盤技術</text>
  <text x="160" y="156" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#1A1A1A" text-anchor="middle">Gemini 3.5</text>
  <text x="160" y="174" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#808080" text-anchor="middle">+ Antigravity</text>
  <text x="160" y="192" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#808080" text-anchor="middle">+ 内蔵クラウド PC</text>
  <line x1="48" y1="204" x2="290" y2="204" stroke="#DEDEDE" stroke-width="1"/>
  <text x="160" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">Google AI Ultra から</text>
  <text x="160" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#1A73E8" text-anchor="middle">順次ロールアウト中</text>

  <line x1="310" y1="108" x2="310" y2="264" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Middle: 4 features -->
  <rect x="330" y="108" width="244" height="54" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="128" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">① AI の思考プロセスが見える</text>
  <text x="350" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">推論の過程をリアルタイムで確認可能</text>

  <rect x="330" y="170" width="244" height="36" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="186" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">② 100以上のソフトウェアスキルを使用</text>
  <text x="350" y="202" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#4D4D4D">複雑な多段階リサーチを自律実行</text>

  <rect x="330" y="214" width="244" height="36" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="230" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">③ PDF・Excel・PPT・グラフを出力</text>
  <text x="350" y="246" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#4D4D4D">会話から成果物まで一気通貫</text>

  <!-- Right: feature 4 + insight -->
  <rect x="590" y="108" width="242" height="54" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="610" y="128" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">④ 「何を調べるか」からブレスト</text>
  <text x="610" y="148" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#4D4D4D">テーマ設定ゼロから一緒に考えてくれる</text>

  <rect x="590" y="170" width="242" height="94" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="610" y="190" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">インサイト</text>
  <line x1="610" y1="200" x2="812" y2="200" stroke="#DEDEDE" stroke-width="1"/>
  <text x="610" y="220" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">「読む AI」から「動いて作る AI」へ</text>
  <text x="610" y="238" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">リサーチ AI の主戦場が変わる</text>
  <text x="610" y="256" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">Perplexity・ChatGPT への直接対抗</text>

  <rect x="32" y="276" width="816" height="20" rx="4" fill="#F0D8E8"/>
  <text x="440" y="290" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">NotebookLM が「リサーチから納品まで」を一人でこなすエージェントに ― Google が本気を出した</text>
</svg>
