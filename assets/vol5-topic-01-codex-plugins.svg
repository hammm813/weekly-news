<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 01 — ツール / OpenAI Codex プラグイン拡張</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Codex がロール特化型AIへ　62アプリ・110スキルをコード不要で即導入</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Key stat -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">プラグイン規模</text>
  <text x="158" y="170" font-family="'Nunito Sans',sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">62</text>
  <text x="158" y="190" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">人気アプリに対応</text>
  <line x1="68" y1="200" x2="248" y2="200" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="222" font-family="'Nunito Sans',sans-serif" font-size="32" font-weight="900" fill="#8C52FF" text-anchor="middle">110</text>
  <text x="158" y="240" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">スキルを搭載</text>

  <!-- Feature boxes -->
  <rect x="288" y="108" width="240" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① ロール特化インストール</text>
  <text x="308" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">1回インストールするだけで</text>
  <text x="308" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">その職種の専門AIに変わる</text>

  <rect x="288" y="182" width="240" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="206" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② コーディング不要</text>
  <text x="308" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">非エンジニアでも</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ビジネス特化AIを即セットアップ</text>

  <!-- Right box: use cases -->
  <rect x="548" y="108" width="284" height="140" rx="8" fill="#1E0E1E"/>
  <text x="690" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">対応ロール（例）</text>
  <line x1="568" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="568" y="164" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ セールス</text>
  <text x="568" y="185" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ データアナリティクス</text>
  <text x="568" y="206" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ クリエイティブ制作</text>
  <text x="568" y="227" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ プロダクトデザイン</text>
  <text x="568" y="248" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#D9D9D9">▸ 株式投資リサーチ</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「AIを使う」から「AIに仕事を任せる」へ ― ロール特化インストールで即日戦力化</text>
</svg>
