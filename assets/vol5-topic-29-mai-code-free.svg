  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">無料でプロ級 AI コーディングが手に入る時代 ― コーディング AI の民主化が一気に加速</text>
