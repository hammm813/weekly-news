  <text x="540" y="166" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#8C52FF"> 60%減</text>

  <rect x="268" y="182" width="274" height="66" rx="8" fill="#2A1A2A"/>
  <text x="288" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">設計の差別化</text>
