<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 39 — ツール / Google Workspace Gemini 2026年6月3日アップデート</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">Gemini for Drive が Gmail をソースに追加　Drive 内 AI 検索がメールまで横断可能に</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: update highlight -->
  <text x="160" y="136" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">アップデート日</text>
  <text x="160" y="158" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#1A1A1A" text-anchor="middle">2026.06.03</text>
  <text x="160" y="182" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">Google Workspace</text>
  <text x="160" y="200" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">Gemini 機能追加</text>

  <line x1="310" y1="108" x2="310" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- What changed -->
  <rect x="330" y="108" width="490" height="54" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="128" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D">変更点：Gmail が Drive の Ask Gemini のソースに追加</text>
  <text x="350" y="148" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">これまで：フォルダ・ファイルのみ参照可能</text>
  <text x="350" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#1A73E8">これから：Gmail のメールもソースとして追加可能</text>

  <rect x="330" y="170" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="188" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#8C52FF">活用シーン</text>
  <text x="350" y="208" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">Drive 内の文書 + Gmail の関連メールを横断して Gemini が回答・要約</text>

  <rect x="330" y="222" width="490" height="0" rx="6"/>
  <rect x="330" y="218" width="490" height="26" rx="6" fill="#F0D8E8"/>
  <text x="350" y="235" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#A51E6D" font-weight="700">Google Workspace が「社内情報の統合 AI 基盤」へ着実に進化</text>

  <rect x="32" y="248" width="816" height="20" rx="4" fill="#F0D8E8"/>
  <text x="440" y="262" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">メール × ファイルを横断検索できる AI が職場の標準に ― 情報サイロが解消される</text>
</svg>
