<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <!-- Background -->
  <rect width="100%" height="300" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="300" fill="#A51E6D"/>

  <!-- Label -->
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 07 — 国内トレンド</text>

  <!-- Title -->
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">国内AIエージェント動向　"PoC止まり"から"運用型"へ移行加速</text>

  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Phase arrow -->
  <rect x="32" y="110" width="220" height="56" rx="8" fill="#ECECEC"/>
  <text x="142" y="136" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#808080" text-anchor="middle">フェーズ①</text>
  <text x="142" y="156" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D" text-anchor="middle">単純な生成AI活用</text>

  <text x="279" y="153" font-family="'Nunito Sans',sans-serif" font-size="18" fill="#B3B3B3" text-anchor="middle">→</text>

  <rect x="300" y="110" width="220" height="56" rx="8" fill="#F6E9F0" stroke="#A51E6D" stroke-width="1"/>
  <text x="410" y="136" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#A51E6D" text-anchor="middle">フェーズ②</text>
  <text x="410" y="156" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D" text-anchor="middle">PoC・概念実証段階</text>

  <text x="528" y="153" font-family="'Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#A51E6D" text-anchor="middle">→</text>

  <rect x="550" y="104" width="280" height="68" rx="8" fill="#A51E6D"/>
  <text x="690" y="130" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#E0C0D0" text-anchor="middle">フェーズ③（現在）</text>
  <text x="690" y="150" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle">業務プロセスへの深い組み込み</text>
  <text x="690" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#E0C0D0" text-anchor="middle">= 運用型エージェント</text>

  <!-- Divider -->
  <line x1="32" y1="190" x2="848" y2="190" stroke="#ECECEC" stroke-width="1"/>

  <!-- Competition axis change -->
  <text x="32" y="215" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#4D4D4D">▶ 競争軸の変化</text>
  <text x="32" y="236" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#808080">旧：</text>
  <text x="56" y="236" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#808080">モデル性能（賢さ）</text>
  <text x="220" y="236" font-family="'Nunito Sans',sans-serif" font-size="16" font-weight="900" fill="#A51E6D">→</text>
  <text x="240" y="236" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#A51E6D">顧客固有データの扱い・現場定着・セキュリティ・専門業務への適合度</text>

  <text x="32" y="260" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">注目企業：ブーストマーケティング（Dify）　Metrics「AI CFO」　LayerX「バクラク」　アクセンチュア×Anthropic　Twilio Japan</text>
</svg>
