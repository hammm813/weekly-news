<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="280" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 20 — ツール / Google Gemini 共有機能強化</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">Gemini の成果物を Chat・Canvas・Google Drive から共有可能に　コラボ機能が一体化</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Left: sharing methods -->
  <text x="160" y="148" font-family="'Nunito Sans',sans-serif" font-size="44" font-weight="900" fill="#A51E6D" text-anchor="middle">3</text>
  <text x="160" y="174" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700" fill="#4D4D4D" text-anchor="middle">共有経路</text>

  <line x1="310" y1="108" x2="310" y2="210" stroke="#DEDEDE" stroke-width="1"/>

  <!-- 3 share methods -->
  <rect x="330" y="108" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="126" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="700" fill="#A51E6D">① Gemini Chat</text>
  <text x="350" y="144" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">会話の流れのままチームへ直接共有</text>

  <rect x="330" y="160" width="490" height="44" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="178" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="700" fill="#8C52FF">② Gemini Canvas</text>
  <text x="350" y="196" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">AI 生成ドキュメントをリアルタイム共同編集</text>

  <rect x="330" y="208" width="490" height="0" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <rect x="330" y="208" width="490" height="28" rx="6" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="350" y="226" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="700" fill="#1A73E8">③ Google Drive</text>
  <text x="490" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D">　既存のファイル共有フローに自然に統合</text>

  <rect x="32" y="246" width="816" height="22" rx="4" fill="#F0D8E8"/>
  <text x="440" y="261" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI 成果物の共有が「ツール切替なし」で完結 ― Gemini がビジネス共有の起点になる</text>
</svg>
