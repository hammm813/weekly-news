<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 03 — ツール / Claude Platform CLI「ant」</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Claude Platform に公式 CLI「ant」登場　ターミナルから API・エージェントを即操作</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: CLI highlight -->
  <rect x="48" y="108" width="200" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="148" y="138" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">公式 CLI ツール</text>
  <text x="148" y="178" font-family="'Nunito Sans',sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">ant</text>
  <text x="148" y="206" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B3B3B3" text-anchor="middle">Anthropic 公式リリース</text>
  <text x="148" y="224" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">全 API エンドポイントに対応</text>

  <!-- Middle: capabilities -->
  <rect x="268" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="288" y="132" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① Messages API 呼び出し</text>
  <text x="288" y="152" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ターミナルから直接 API を実行</text>
  <text x="288" y="168" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">結果をシェルにパイプ処理</text>

  <rect x="268" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="288" y="206" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② Claude Managed Agents 起動</text>
  <text x="288" y="226" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">エージェントをコマンド1行で</text>
  <text x="288" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">スタンドアップ・管理</text>

  <!-- Right: coding agent integration -->
  <rect x="552" y="108" width="280" height="140" rx="8" fill="#1E0E1E"/>
  <text x="692" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">Claude Code との統合</text>
  <line x1="572" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="572" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">claude-api スキルを介して</text>
  <text x="572" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">コーディングエージェントが</text>
  <text x="572" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ant CLI を自律的に理解・操作</text>
  <line x1="572" y1="218" x2="812" y2="218" stroke="#333333" stroke-width="1"/>
  <text x="692" y="238" font-family="'Nunito Sans',sans-serif" font-size="12" font-weight="700" fill="#8C52FF" text-anchor="middle">AI × AI 連携の入口</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">開発者はターミナルひとつで AI を制御できる時代 ― Claude Code × ant CLI でエージェント開発が加速</text>
</svg>
