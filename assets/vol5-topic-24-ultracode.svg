<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" width="100%" height="280">
  <rect width="100%" height="280" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 24 — ツール / Claude Dynamic Workflow トリガー変更</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Dynamic Workflow のトリガーが「ultracode」に変更　誤作動を防ぐ UX 改善</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: before/after -->
  <rect x="48" y="108" width="240" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="168" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">トリガーワードの変更</text>
  <line x1="68" y1="142" x2="268" y2="142" stroke="#5A1035" stroke-width="1"/>
  <text x="168" y="166" font-family="'Nunito Sans',sans-serif" font-size="14" fill="#808080" text-anchor="middle">旧：</text>
  <text x="220" y="166" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#FF5757">"workflow"</text>
  <text x="168" y="192" font-family="'Nunito Sans',sans-serif" font-size="20" font-weight="900" fill="#FF5757" text-anchor="middle">↓</text>
  <text x="168" y="218" font-family="'Nunito Sans',sans-serif" font-size="14" fill="#B3B3B3" text-anchor="middle">新：</text>
  <text x="220" y="218" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#8C52FF">"ultracode"</text>
  <text x="168" y="240" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">ユーザーフィードバックを受けて変更</text>

  <!-- Middle: details -->
  <rect x="308" y="108" width="270" height="64" rx="8" fill="#2A1A2A"/>
  <text x="328" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">引き続き使えること</text>
  <text x="328" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「このタスクにワークフローを使って」</text>
  <text x="328" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">という文脈では従来通り機能する</text>

  <rect x="308" y="182" width="270" height="66" rx="8" fill="#2A1A2A"/>
  <text x="328" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">変更の理由</text>
  <text x="328" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">「workflow」という単語を別の意味で</text>
  <text x="328" y="240" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">使ったときの誤起動を防ぐため</text>

  <!-- Right: how to use -->
  <rect x="598" y="108" width="234" height="140" rx="8" fill="#1E0E1E"/>
  <text x="715" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">使い方まとめ</text>
  <line x1="618" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="618" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">明示的に起動したい場合</text>
  <text x="715" y="188" font-family="'Nunito Sans',sans-serif" font-size="16" font-weight="900" fill="#8C52FF" text-anchor="middle">"ultracode"</text>
  <line x1="618" y1="202" x2="812" y2="202" stroke="#333333" stroke-width="1"/>
  <text x="618" y="220" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">文脈から明らかな場合は</text>
  <text x="618" y="236" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">"workflow" でも引き続き機能</text>

  <rect x="48" y="260" width="784" height="16" rx="4" fill="#350A20"/>
  <text x="440" y="272" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">意図しない AI 起動を防ぐ設計 ― 「明示性」がエージェント操作の基本原則に</text>
</svg>
