<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 27 — AI モデル / 音声合成「Miso One」登場</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">「世界最高の感情表現」Miso One 発表　110ms 低遅延・8B TTS モデルをオープンソース公開</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: key specs -->
  <rect x="48" y="108" width="220" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="158" y="132" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">Miso One</text>
  <text x="158" y="152" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">テキスト → 音声合成モデル</text>
  <line x1="68" y1="162" x2="248" y2="162" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="184" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">110ms</text>
  <text x="158" y="204" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#FF5757" text-anchor="middle">レイテンシ（人間より速い）</text>
  <line x1="68" y1="216" x2="248" y2="216" stroke="#5A1035" stroke-width="1"/>
  <text x="158" y="234" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#8C52FF" text-anchor="middle">8B params</text>

  <!-- Middle: features -->
  <rect x="288" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="308" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① 世界最高の感情表現</text>
  <text x="308" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">感情・抑揚・ニュアンスを人間並みに再現</text>
  <text x="308" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">高表現力のスピーチ生成を実現</text>

  <rect x="288" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="308" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② オープンソース公開</text>
  <text x="308" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">モデルウェイト：即時利用可能</text>
  <text x="308" y="242" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">API アクセス：近日提供予定</text>

  <!-- Right: significance -->
  <rect x="572" y="108" width="260" height="140" rx="8" fill="#1E0E1E"/>
  <text x="702" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">音声 AI の新基準</text>
  <line x1="592" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="592" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">これまでの音声 AI の課題</text>
  <text x="592" y="182" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">　機械的・感情が薄い</text>
  <text x="592" y="202" font-family="'Nunito Sans',sans-serif" font-size="14" font-weight="900" fill="#FF5757" text-anchor="middle">→ Miso One が解決</text>
  <line x1="592" y1="216" x2="812" y2="216" stroke="#333333" stroke-width="1"/>
  <text x="592" y="236" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">カスタマーサポート・</text>
  <text x="592" y="252" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">コンテンツ制作への応用拡大</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">AI の声が「人間らしく」なる ― 音声インターフェースが次のメインストリームになる日が近い</text>
</svg>
