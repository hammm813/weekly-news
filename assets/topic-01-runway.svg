<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <!-- Background -->
  <rect width="100%" height="300" fill="#A51E6D"/>

  <!-- Label -->
  <text x="48" y="52" font-family="'Nunito Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="700" letter-spacing="3" fill="#E0C0D0" text-anchor="start">TOPIC 01 — GLOBAL</text>

  <!-- Title -->
  <text x="48" y="92" font-family="'Noto Sans JP','Nunito Sans',sans-serif" font-size="22" font-weight="900" fill="#ffffff">Runway、東京オフィス開設・日本市場に本格参入</text>

  <!-- Divider -->
  <line x1="48" y1="108" x2="832" y2="108" stroke="#CC5090" stroke-width="1"/>

  <!-- Card 1: Investment -->
  <rect x="48" y="128" width="230" height="120" rx="10" fill="#B83070" stroke="#CC5090" stroke-width="1"/>
  <text x="163" y="165" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="700" fill="#E0C0D0" text-anchor="middle" letter-spacing="1">INVESTMENT</text>
  <text x="163" y="210" font-family="'Nunito Sans',sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">$40M</text>
  <text x="163" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#E0C0D0" text-anchor="middle">初期投資額（約60億円）</text>

  <!-- Card 2: Customer Growth -->
  <rect x="298" y="128" width="230" height="120" rx="10" fill="#B83070" stroke="#CC5090" stroke-width="1"/>
  <text x="413" y="165" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="700" fill="#E0C0D0" text-anchor="middle" letter-spacing="1">GROWTH</text>
  <text x="413" y="210" font-family="'Nunito Sans',sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">3x</text>
  <text x="413" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#E0C0D0" text-anchor="middle">法人顧客数（過去12ヶ月）</text>

  <!-- Card 3: Market Rank -->
  <rect x="548" y="128" width="230" height="120" rx="10" fill="#B83070" stroke="#CC5090" stroke-width="1"/>
  <text x="663" y="165" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="700" fill="#E0C0D0" text-anchor="middle" letter-spacing="1">MARKET RANK</text>
  <text x="663" y="210" font-family="'Nunito Sans',sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">#3</text>
  <text x="663" y="234" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#E0C0D0" text-anchor="middle">グローバル市場での日本の順位</text>

  <!-- Footer note -->
  <text x="48" y="282" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D4A8C0">導入企業：ヤマハ・ソフトバンク・NHN　|　対象分野：マーケティング・広告・ゲーム・メディア・ロボティクス</text>
</svg>
