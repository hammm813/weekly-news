<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#F6E9F0"/>
  <rect x="0" y="0" width="6" height="300" fill="#A51E6D"/>
  <text x="32" y="44" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 03 — Global / OpenAI 企業向け新組織</text>
  <text x="32" y="76" font-family="'Noto Sans JP',sans-serif" font-size="18" font-weight="900" fill="#1A1A1A">OpenAI Deployment Company 設立　＋　Tomoro 買収で150名即戦力</text>
  <line x1="32" y1="92" x2="848" y2="92" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Center org box -->
  <rect x="290" y="104" width="300" height="56" rx="8" fill="#1A1A1A"/>
  <text x="440" y="127" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle">OpenAI Deployment Company</text>
  <text x="440" y="148" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#A51E6D" text-anchor="middle">majority-owned by OpenAI</text>

  <!-- Left: 19社 -->
  <rect x="32" y="112" width="230" height="80" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="147" y="138" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#A51E6D" text-anchor="middle">19</text>
  <text x="147" y="160" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#4D4D4D" text-anchor="middle">社と連携</text>
  <text x="147" y="180" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">投資会社・コンサル・SIer</text>

  <!-- Right: Tomoro -->
  <rect x="618" y="112" width="230" height="80" rx="8" fill="#ffffff" stroke="#DEDEDE" stroke-width="1"/>
  <text x="733" y="134" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#4D4D4D" text-anchor="middle">Tomoro 買収</text>
  <text x="733" y="158" font-family="'Nunito Sans',sans-serif" font-size="36" font-weight="900" fill="#8C52FF" text-anchor="middle">150</text>
  <text x="733" y="180" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">FDE・デプロイメントSP を即日投入</text>

  <!-- Arrows -->
  <line x1="262" y1="152" x2="290" y2="132" stroke="#A51E6D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="618" y1="132" x2="590" y2="152" stroke="#8C52FF" stroke-width="1.5"/>

  <text x="32" y="226" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700" fill="#4D4D4D">▶ ミッション</text>
  <text x="32" y="248" font-family="'Noto Sans JP',sans-serif" font-size="12" fill="#4D4D4D">企業のフロンティア AI を本番環境へ導入・定着させるまでを一貫支援</text>
  <text x="32" y="270" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">OpenAI が「作るだけ」から「使わせるところまで」へ　― 中小・ローカル企業への細かな伴走は個人コンサルの強みが活きる</text>
</svg>
