<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="100%" height="300">
  <rect width="100%" height="300" fill="#1A1A1A"/>
  <text x="48" y="46" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" letter-spacing="3" fill="#A51E6D">TOPIC 26 — AI モデル / Google Gemma 4 12B リリース</text>
  <text x="48" y="78" font-family="'Noto Sans JP',sans-serif" font-size="19" font-weight="900" fill="#ffffff">Google「Gemma 4 12B」登場　ラップトップで動くマルチモーダル AI を Apache 2.0 で公開</text>
  <line x1="48" y1="94" x2="832" y2="94" stroke="#333333" stroke-width="1"/>

  <!-- Left: model highlight -->
  <rect x="48" y="108" width="210" height="140" rx="8" fill="#350A20" stroke="#7A1050" stroke-width="1"/>
  <text x="153" y="134" font-family="'Nunito Sans',sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" text-anchor="middle">Gemma 4</text>
  <text x="153" y="158" font-family="'Nunito Sans',sans-serif" font-size="28" font-weight="900" fill="#A51E6D" text-anchor="middle">12B</text>
  <text x="153" y="178" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">by Google</text>
  <line x1="68" y1="190" x2="238" y2="190" stroke="#5A1035" stroke-width="1"/>
  <text x="153" y="212" font-family="'Nunito Sans',sans-serif" font-size="13" font-weight="900" fill="#34A853" text-anchor="middle">Apache 2.0</text>
  <text x="153" y="232" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080" text-anchor="middle">完全オープンソース</text>

  <!-- Middle: key features -->
  <rect x="278" y="108" width="264" height="64" rx="8" fill="#2A1A2A"/>
  <text x="298" y="130" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">① 統合型マルチモーダル設計</text>
  <text x="298" y="150" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">エンコーダー不要の統一アーキテクチャ</text>
  <text x="298" y="166" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">テキスト＋画像を単一モデルで処理</text>

  <rect x="278" y="182" width="264" height="66" rx="8" fill="#2A1A2A"/>
  <text x="298" y="204" font-family="'Nunito Sans',sans-serif" font-size="11" font-weight="900" fill="#A51E6D">② ラップトップで動作するサイズ</text>
  <text x="298" y="224" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">高性能 AI をエッジデバイスに</text>
  <text x="298" y="240" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">クラウド不要・プライベート実行が可能</text>

  <!-- Right: significance -->
  <rect x="562" y="108" width="270" height="140" rx="8" fill="#1E0E1E"/>
  <text x="697" y="132" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">何が重要か</text>
  <line x1="582" y1="142" x2="812" y2="142" stroke="#333333" stroke-width="1"/>
  <text x="582" y="164" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">エッジ効率性 × 高度な推論の</text>
  <text x="582" y="184" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#D9D9D9">ギャップを埋める設計</text>
  <line x1="582" y1="198" x2="812" y2="198" stroke="#333333" stroke-width="1"/>
  <text x="582" y="218" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">Apache 2.0 = 商用利用・改変・</text>
  <text x="582" y="236" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#808080">再配布すべて自由</text>
  <text x="582" y="254" font-family="'Noto Sans JP',sans-serif" font-size="10" fill="#808080">自社製品への組み込みが最も自由度高い</text>

  <rect x="48" y="264" width="784" height="24" rx="4" fill="#350A20"/>
  <text x="440" y="280" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" fill="#A51E6D" text-anchor="middle">「ラップトップで動く高性能 AI」が現実に ― ローカル AI 時代の幕開けを Google が牽引</text>
</svg>
